<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>바루픽 — 곧 만나요</title>
    <meta name="description" content="색으로 완성하는 나만의 스타일. 바루픽이 곧 찾아옵니다.">
    <meta property="og:title" content="바루픽 — 곧 만나요">
    <meta property="og:description" content="AI 컬러 코디 추천 · 퍼스널컬러 진단 · 코디 커뮤니티">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --terra: #C2703A;
            --terra-dark: #A8613F;
            --terra-light: #E8A878;
            --warm-50: #FAFAF8;
            --warm-100: #F5F0EB;
            --warm-200: #E7DDD2;
            --warm-600: #8C7A6B;
            --warm-900: #3C3632;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', -apple-system, sans-serif;
            background: var(--warm-50);
            color: var(--warm-900);
            min-height: 100dvh;
            overflow-x: hidden;
        }

        /* ─── 배경 ─── */
        .bg-layer {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(194,112,58,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 90%, rgba(194,112,58,0.06) 0%, transparent 50%),
                var(--warm-50);
        }

        .grain {
            position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.3;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        }

        /* ─── 메인 컨테이너 ─── */
        .container {
            position: relative; z-index: 2;
            min-height: 100dvh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 40px 24px;
        }

        /* ─── 로고 ─── */
        .logo-mark {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--terra), var(--terra-dark));
            border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 32px rgba(194,112,58,0.25);
            margin-bottom: 28px;
            animation: float 6s ease-in-out infinite;
        }

        .logo-mark svg { width: 44px; height: 44px; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* ─── 타이포 ─── */
        .title {
            font-size: 28px; font-weight: 900;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            font-size: 14px; font-weight: 400;
            color: var(--warm-600);
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.7;
        }

        /* ─── 카운트다운 ─── */
        .countdown-wrap {
            display: flex; gap: 12px;
            margin-bottom: 32px;
        }

        .cd-unit {
            width: 72px;
            background: white;
            border: 1px solid var(--warm-200);
            border-radius: 16px;
            padding: 14px 0 10px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            transition: transform 0.3s;
        }

        .cd-unit:hover { transform: translateY(-2px); }

        .cd-num {
            font-size: 32px; font-weight: 900;
            color: var(--terra);
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .cd-label {
            font-size: 10px; font-weight: 500;
            color: var(--warm-600);
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ─── 오픈 날짜 ─── */
        .open-date {
            font-size: 13px; font-weight: 500;
            color: var(--terra);
            background: rgba(194,112,58,0.08);
            border: 1px solid rgba(194,112,58,0.15);
            border-radius: 100px;
            padding: 8px 20px;
            margin-bottom: 32px;
            display: inline-flex; align-items: center; gap: 6px;
        }

        /* ─── 기능 프리뷰 ─── */
        .features {
            display: flex; gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 36px;
            max-width: 360px;
        }

        .feat-chip {
            font-size: 11px; font-weight: 500;
            color: var(--warm-600);
            background: white;
            border: 1px solid var(--warm-200);
            border-radius: 100px;
            padding: 6px 14px;
            white-space: nowrap;
        }

        /* ─── CTA 버튼 ─── */
        .cta-btn {
            display: none;
            padding: 14px 48px;
            background: linear-gradient(135deg, var(--terra), var(--terra-dark));
            color: white;
            font-size: 15px; font-weight: 700;
            border: none; border-radius: 100px;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(194,112,58,0.35);
            transition: all 0.3s;
            text-decoration: none;
        }

        .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(194,112,58,0.45); }
        .cta-btn:active { transform: scale(0.97); }
        .cta-btn.visible { display: inline-flex; align-items: center; gap: 8px; }

        /* ─── 닉네임 팁 ─── */
        .nick-tip {
            margin-top: 24px;
            padding: 14px 20px;
            background: rgba(194,112,58,0.06);
            border: 1px dashed rgba(194,112,58,0.2);
            border-radius: 14px;
            text-align: center;
            max-width: 340px;
        }

        .nick-tip p {
            font-size: 12px; color: var(--warm-600); line-height: 1.6;
        }

        .nick-tip strong { color: var(--terra); font-weight: 700; }

        /* ─── 푸터 ─── */
        .footer {
            margin-top: 48px;
            text-align: center;
            font-size: 11px;
            color: var(--warm-600);
            opacity: 0.6;
        }

        /* ─── 카운터 (개발자용, 숨김) ─── */
        .visit-counter {
            position: fixed; bottom: 8px; right: 8px;
            font-size: 10px; color: var(--warm-200);
            z-index: 10;
        }

        /* ─── 오픈 후 상태 ─── */
        .opened .countdown-wrap { display: none; }
        .opened .open-date { background: rgba(34,197,94,0.08); border-color: rgba(34,197,94,0.2); color: #16a34a; }

        /* ─── 애니메이션 ─── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .anim { opacity: 0; animation: fadeUp 0.6s ease forwards; }
        .anim-1 { animation-delay: 0.1s; }
        .anim-2 { animation-delay: 0.2s; }
        .anim-3 { animation-delay: 0.3s; }
        .anim-4 { animation-delay: 0.4s; }
        .anim-5 { animation-delay: 0.5s; }
        .anim-6 { animation-delay: 0.6s; }
        .anim-7 { animation-delay: 0.7s; }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="grain"></div>

    <div class="container" id="main">
        <div class="logo-mark anim anim-1">
            <svg viewBox="0 0 100 100" fill="none">
                <path d="M50 15 C50 15, 65 10, 65 25 C65 35, 55 38, 50 45 C45 38, 35 35, 35 25 C35 10, 50 15, 50 15Z" fill="white" opacity="0.9"/>
                <path d="M30 40 L70 40 L65 80 C63 85, 55 88, 50 88 C45 88, 37 85, 35 80 Z" fill="white" opacity="0.9"/>
                <path d="M42 55 L58 55 L56 70 C55 73, 52 75, 50 75 C48 75, 45 73, 44 70 Z" fill="rgba(194,112,58,0.3)"/>
            </svg>
        </div>

        <h1 class="title anim anim-2">바루픽</h1>
        <p class="subtitle anim anim-3">
            색으로 완성하는 나만의 스타일<br>
            AI 컬러 코디 추천이 곧 찾아옵니다
        </p>

        <div class="open-date anim anim-4" id="dateLabel">
            🗓 3월 7일 (토) 오후 8시 오픈
        </div>

        <div class="countdown-wrap anim anim-5" id="countdown">
            <div class="cd-unit"><div class="cd-num" id="cd-d">0</div><div class="cd-label">일</div></div>
            <div class="cd-unit"><div class="cd-num" id="cd-h">0</div><div class="cd-label">시간</div></div>
            <div class="cd-unit"><div class="cd-num" id="cd-m">0</div><div class="cd-label">분</div></div>
            <div class="cd-unit"><div class="cd-num" id="cd-s">0</div><div class="cd-label">초</div></div>
        </div>

        <div class="features anim anim-5">
            <span class="feat-chip">🎨 AI 컬러 코디</span>
            <span class="feat-chip">🪞 퍼스널컬러 진단</span>
            <span class="feat-chip">👔 마네킹 시뮬레이션</span>
            <span class="feat-chip">🌐 코디 커뮤니티</span>
            <span class="feat-chip">📊 스타일 인사이트</span>
        </div>

        <a class="cta-btn anim anim-6" id="ctaBtn" href="https://barupick.vercel.app">
            바루픽 시작하기 →
        </a>

        <div class="nick-tip anim anim-7">
            <p>💡 <strong>오픈 시간에 먼저 가입하면<br>원하는 닉네임을 선점</strong>할 수 있어요!</p>
        </div>

        <div class="footer anim anim-7">
            © 2026 김나름 · 바루픽(BaruPick)
        </div>
    </div>

    <div class="visit-counter" id="visitCounter"></div>

    <script>
        // ─── 설정 ───
        const OPEN_TIME = new Date('2026-03-07T20:00:00+09:00').getTime();
        const SUPABASE_URL = 'https://kwcogjzwpnvqwmifizce.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3Y29nanp3cG52cXdtaWZpemNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzYwODQsImV4cCI6MjA4Nzg1MjA4NH0.9vxFkBSMERxEtQnwEPceEAosLCZjY9NLQO9qfx-MZlw';

        // ─── 트래픽 추적 ───
        (async function trackVisit() {
            try {
                const ref = document.referrer || 'direct';
                const ua = navigator.userAgent || '';
                // 세션당 1회만 기록
                if (sessionStorage.getItem('bp_bridge_tracked')) return;
                sessionStorage.setItem('bp_bridge_tracked', '1');

                const res = await fetch(SUPABASE_URL + '/rest/v1/bridge_visits', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY,
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({
                        referrer: ref.substring(0, 500),
                        user_agent: ua.substring(0, 500),
                        source: new URLSearchParams(location.search).get('from') || 'unknown'
                    })
                });

                // 방문 수 조회 (개발자용)
                const countRes = await fetch(SUPABASE_URL + '/rest/v1/bridge_visits?select=id', {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Prefer': 'count=exact' }
                });
                const total = countRes.headers.get('content-range');
                if (total) {
                    const num = total.split('/')[1];
                    document.getElementById('visitCounter').textContent = num;
                }
            } catch(e) {
                console.log('Track error (ok):', e);
            }
        })();

        // ─── CTA 클릭 추적 ───
        document.getElementById('ctaBtn').addEventListener('click', function(e) {
            try {
                fetch(SUPABASE_URL + '/rest/v1/bridge_visits', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY,
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({
                        referrer: 'cta_click',
                        user_agent: navigator.userAgent.substring(0, 500),
                        source: 'cta_enter'
                    })
                });
            } catch(e) {}
        });

        // ─── 카운트다운 ───
        function updateCountdown() {
            const now = Date.now();
            const diff = OPEN_TIME - now;

            if (diff <= 0) {
                // 오픈됨!
                document.getElementById('main').classList.add('opened');
                document.getElementById('dateLabel').innerHTML = '✅ 바루픽이 오픈되었어요!';
                document.getElementById('ctaBtn').classList.add('visible');
                document.querySelector('.nick-tip p').innerHTML = '💡 <strong>지금 가입하면 원하는 닉네임을 선점</strong>할 수 있어요!';
                return;
            }

            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            document.getElementById('cd-d').textContent = d;
            document.getElementById('cd-h').textContent = String(h).padStart(2, '0');
            document.getElementById('cd-m').textContent = String(m).padStart(2, '0');
            document.getElementById('cd-s').textContent = String(s).padStart(2, '0');

            requestAnimationFrame(() => setTimeout(updateCountdown, 1000));
        }

        updateCountdown();
    </script>
</body>
</html>
