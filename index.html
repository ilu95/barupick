            closetGenerateCoord() {
                var items = this.getClosetItems();
                var cc = this._closetCoord;
                var layerType = cc.layerType || 'simple';
                var ld = LAYER_LEVELS[layerType];
                if (!ld) return;

                // 카테고리별 아이템 그룹
                var byCat = {};
                items.forEach(function (i) { if (!byCat[i.category]) byCat[i.category] = []; byCat[i.category].push(i); });

                var allStyles = Object.keys(STYLE_MOODS);
                var allResults = [];
                var pc = profile.getPersonalColor();

                // 옷장 아이템 조합 생성
                // 각 카테고리에서 아이템 골라 pin 조합을 만들고 스타일별로 추천
                var pinCombos = this._closetPinCombos(byCat, ld.partKeys);

                pinCombos.forEach(function (pins) {
                    // 여러 스타일에 걸쳐 시도
                    var stylesPool = allStyles.slice().sort(function () { return Math.random() - 0.5; }).slice(0, 6);
                    stylesPool.forEach(function (style) {
                        var outfits = generateOutfitsWithPins(style, 3, layerType, pins);
                        var combos = outfitsToComboFormat(outfits, style, layerType);
                        combos.forEach(function (c) {
                            // 어떤 부위가 옷장 아이템인지 표시
                            c._closetParts = {};
                            Object.keys(pins).forEach(function (pk) {
                                c._closetParts[pk] = true;
                            });
                            // 옷장에 없는 부위 중 우연히 같은 색이면 표시
                            ld.partKeys.forEach(function (pk) {
                                if (!c._closetParts[pk] && byCat[pk]) {
                                    var match = byCat[pk].find(function (it) { return it.colorKey === c.outfit[pk]; });
                                    if (match) c._closetParts[pk] = true;
                                }
                            });
                            allResults.push(c);
                        });
                    });
                });

                // 퍼스널컬러 보너스
                if (pc) {
                    var pcData = PERSONAL_COLOR_12[pc];
                    if (pcData) {
                        allResults.forEach(function (r) {
                            var bonus = 0;
                            ['scarf', 'top', 'middleware'].forEach(function (item) {
                                if (r.outfit[item]) {
                                    if ((pcData.bestColors || []).includes(r.outfit[item])) bonus += 3;
                                    if ((pcData.avoidColors || []).includes(r.outfit[item])) bonus -= 5;
                                }
                            });
                            r.score += bonus;
                        });
                    }
                }

                // 중복 제거 + 정렬
                var seen = {};
                allResults = allResults.filter(function (r) {
                    var key = ld.partKeys.map(function (k) { return r.outfit[k]; }).join('/');
                    if (seen[key]) return false;
                    seen[key] = true;
                    return true;
                });
                allResults.sort(function (a, b) { return b.score - a.score; });

                cc.results = allResults.slice(0, 30);
                this.goTo('closet-coord-results');
            },

            _closetPinCombos(byCat, partKeys) {
                // 옷장에 있는 카테고리별로 pin 조합 생성 (최대 12개)
                var combos = [{}];
                partKeys.forEach(function (pk) {
                    if (!byCat[pk] || byCat[pk].length === 0) return;
                    var newCombos = [];
                    var itemsToTry = byCat[pk].slice(0, 3); // 카테고리당 최대 3개
                    combos.forEach(function (existing) {
                        itemsToTry.forEach(function (item) {
                            var c = Object.assign({}, existing);
                            c[pk] = item.colorKey;
                            newCombos.push(c);
                        });
                    });
                    combos = newCombos;
                    // 폭발 방지: 최대 12개
                    if (combos.length > 12) {
                        combos.sort(function () { return Math.random() - 0.5; });
                        combos = combos.slice(0, 12);
                    }
                });
                return combos;
            },

            openSaveModal(source, comboIdx) {

                    Object.entries(this.build.colors).forEach(function (e) { if (e[1]) outfit[e[0]] = e[1]; });
                    var pc = profile.getPersonalColor();
                    score = evaluationSystem.evaluate(outfit, pc).total;
                    style = this.build.style || '';
                    layerType = this.detectLayerType(Object.keys(outfit));
                    outerType = this.build.outerType || 'coat';
                    midType = this.build.midType || 'knit';
                } else if (source === 'rec') {
                    var combo = this.recommend.results[comboIdx || 0];
                    if (!combo) return;
                    outfit = Object.assign({}, combo.outfit);
                    score = combo.score?.total || 0;
                    style = this.recommend.style || '';
                    layerType = this.recommend.layerType || 'basic';
                    outerType = this.build?.outerType || 'coat';
                    midType = this.build?.midType || 'knit';
                }
                this._pendingSave = { outfit, score, style, layerType, outerType, midType };

                var styleName = STYLE_MOODS[style]?.nameKo || '';
                var defaultName = styleName ? styleName + ' 코디' : '내 코디';
                var now = new Date();
                var dateStr = (now.getMonth() + 1) + '/' + now.getDate();
                defaultName = dateStr + ' ' + defaultName;

                var overlay = document.createElement('div');

            confirmSave() {
                var name = (document.getElementById('saveNameInput')?.value || '').trim();
                var memo = (document.getElementById('saveMemoInput')?.value || '').trim();
                if (!name) { name = '내 코디'; }

                // 태그 수집
                var tags = [];
                var tagBtns = document.querySelectorAll('#saveTagWrap button.bg-terra-100');
                tagBtns.forEach(function(btn) { tags.push(btn.getAttribute('data-tag')); });

                var data = this._pendingSave;
                if (!data) return;

                var saved = this.getSavedOutfits();
                saved.unshift({
                    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
                    name: name,
                    memo: memo,
                    tags: tags,
                    outfit: data.outfit,
                    score: data.score,
                    style: data.style,
                    layerType: data.layerType,
                    outerType: data.outerType,
                    midType: data.midType,
                    createdAt: new Date().toISOString()
                });

                // 최대 50개 제한
                if (saved.length > 50) saved = saved.slice(0, 50);

                try { localStorage.setItem('cs_saved', JSON.stringify(saved)); } catch (e) {}
                this._pendingSave = null;
                this.closeSaveModal();
                this.showShareToast('코디가 저장되었습니다! 💾');

                this.build = {
                    mode: 'coord',
                    items: Object.keys(item.outfit),
                    currentItem: null,
                    itemQueue: [],

                    style: item.style || '',
                    outerType: item.outerType || 'coat',
                    midType: item.midType || 'knit',
                    history: [],
                    _garmentNext: null
                };
                this.goTo('build-result');

                    tagArr.forEach(function(tag) {
                        h += '<button onclick="app._savedFilter=\'' + tag + '\';app.render()" class="px-3 py-1.5 rounded-full text-xs font-medium transition-all ' + (activeFilter === tag ? 'bg-terra-500 text-white' : 'bg-white border border-warm-400 text-warm-700') + '">' + tag + '</button>';

                }

                h += '<div class="flex flex-col gap-2.5">';

                saved.forEach(function (item) {
                    var outfitHex = {};
                    Object.entries(item.outfit).forEach(function (e) {
                        if (e[1]) outfitHex[e[0]] = COLORS_60[e[1]]?.hex || null;
                    });
                    var mn = mannequinToImg(createMannequinSVG(outfitHex, { outerType: item.outerType || 'coat', midType: item.midType || 'knit' }), 'height:50px');

                    var date = '';
                    if (item.createdAt) {
                        var d = new Date(item.createdAt);
                        date = (d.getMonth() + 1) + '/' + d.getDate();
                    }
                    var metaParts = [date];
                    if (item.style && STYLE_MOODS[item.style]) metaParts.push(STYLE_MOODS[item.style].nameKo);
                    if (item.tags && item.tags.length > 0) metaParts.push(item.tags.map(function(t){return '#'+t}).join(' '));
                    if (item.memo) metaParts.push(item.memo);
                    var meta = metaParts.filter(Boolean).join(' · ');

                    h += '<button onclick="app.loadSavedOutfit(\'' + item.id + '\')" class="w-full bg-white border border-warm-400 rounded-2xl p-4 flex items-center gap-3 text-left shadow-warm-sm active:scale-[0.99] transition-all hover:shadow-warm">';
                    h += '<div class="flex-shrink-0">' + mn + '</div>';

                    h += '<span class="font-display text-sm font-bold text-terra-500 flex-shrink-0">' + (item.score || 0) + '</span>';
                    h += '<span onclick="event.stopPropagation();app.deleteSavedOutfit(\'' + item.id + '\')" class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-warm-200 transition-colors">' + svg("trash-2", 16, "#A8A29E") + '</span>';

            async communityLoad(reset) {
                if (!sb) { document.getElementById('comm-status')&&(document.getElementById('comm-status').innerHTML='<div class="text-center py-10 text-warm-600"><div class="text-5xl mb-3">⚠️</div>서버에 연결할 수 없어요</div>'); return; }
                if (this.comm.loading) return;
                if (reset) { this.comm.posts = []; this.comm.page = 0; this.comm.hasMore = true; const g = document.getElementById('comm-grid'); if(g) g.innerHTML=''; }
                this.comm.loading = true;
                const status = document.getElementById('comm-status');
                if (status) status.innerHTML = '<div class="text-center py-8 text-warm-600 text-sm">불러오는 중...</div>';

                try {
                    const PAGE_SIZE = 20;
                    let query = sb.from('posts').select('*, profiles!posts_user_id_fkey(nickname, avatar_url)');
                    if (this.comm.styleFilter) query = query.eq('style', this.comm.styleFilter);
                    if (this.comm.sort === 'popular') query = query.order('likes_count', {ascending:false});
                    else query = query.order('created_at', {ascending:false});
                    query = query.range(this.comm.page * PAGE_SIZE, (this.comm.page+1) * PAGE_SIZE - 1);

                    const { data, error } = await query;
                    if (error) throw error;

                    this.comm.posts = this.comm.posts.concat(data || []);
                    this.comm.hasMore = (data||[]).length === PAGE_SIZE;
                    this.comm.page++;

                    // 내 좋아요 로드 (서버)
                    if (auth.user && data && data.length > 0) {
                        const pids = data.map(p => p.id);
                        const likesRes = await sb.from('likes').select('post_id').eq('user_id', auth.user.id).in('post_id', pids);
                        (likesRes.data||[]).forEach(l => this.comm.myLikes.add(l.post_id));
                    }
                    // 내 저장 로드 (로컬)
                    const saved = this.getSavedOutfits();
                    (data||[]).forEach(p => {
                        if (saved.find(s => s.commPostId === p.id)) this.comm.myBookmarks.add(p.id);
                    });

                    this.renderCommunityGrid();
                } catch(e) {
                    console.error('Community load error:', e);
                    if (status) status.innerHTML = '<div class="text-center py-10 text-warm-600">로딩 실패: ' + (e.message||'') + '</div>';
                }
                this.comm.loading = false;
            },

            renderCommunityGrid() {
                const grid = document.getElementById('comm-grid');
                const status = document.getElementById('comm-status');
                if (!grid) return;

                // 콘텐츠 필터 적용
                let filtered = this.comm.posts;
                if (this.comm.contentFilter === 'photo') {
                    filtered = filtered.filter(p => p.photo_url || (p.photos && p.photos.length > 0));
                } else if (this.comm.contentFilter === 'mannequin') {
                    filtered = filtered.filter(p => !p.photo_url && (!p.photos || p.photos.length === 0));
                }

                if (filtered.length === 0) {
                    grid.innerHTML = '';
                    if (status) status.innerHTML = '<div class="text-center py-10"><div class="text-4xl mb-2">🎨</div><div class="text-sm text-warm-600">' + (this.comm.contentFilter !== 'all' ? '이 필터에 맞는 코디가 없어요' : '아직 공유된 코디가 없어요<br>첫 번째로 공유해보세요!') + '</div></div>';
                    return;
                }

                let h = '';
                filtered.forEach((post, idx) => {
                    const realIdx = this.comm.posts.indexOf(post);
                    const outfit = post.outfit || {};
                    const outfitHex = {};
                    Object.entries(outfit).forEach(([k,v]) => { if(v) outfitHex[k] = COLORS_60[v]?.hex || v; });
                    const mn = mannequinToImg(createMannequinSVG(outfitHex, {}), 'height:70px');
                    const nick = escapeHtml(post.profiles?.nickname) || '유저';
                    const postAvatar = post.profiles?.avatar_url;
                    const style = post.style ? (STYLE_GUIDE[post.style]?.name || post.style) : '';
                    const ago = this._timeAgo(post.created_at);
                    const hasPhoto = post.photo_url || (post.photos && post.photos.length > 0);
                    const photoUrl = post.photo_url || (post.photos && post.photos[0]);
                    const isFollowing = this.comm.myFollows.has(post.user_id);

                    h += '<div class="bg-white rounded-[14px] border border-warm-400 overflow-hidden cursor-pointer active:scale-[0.97] transition-transform shadow-warm-sm" onclick="app.openCommDetail(' + realIdx + ')">';

                    // 사진 + 마네킹 동시 표시
                    if (hasPhoto) {
                        h += '<div class="relative bg-warm-200 min-h-[110px]">';
                        h += '<img src="' + photoUrl + '" class="w-full h-[110px] object-cover" onerror="this.style.display=\'none\'">';
                        h += '<div class="absolute bottom-1 right-1 bg-white/90 rounded-lg p-0.5 shadow-sm">' + mannequinToImg(createMannequinSVG(outfitHex, {}), 'height:32px') + '</div>';
                        h += '</div>';
                    } else {
                        h += '<div class="flex justify-center items-center px-2 pt-3 pb-1 bg-warm-200 min-h-[90px]">' + mn + '</div>';
                    }

                    h += '<div class="px-2.5 pt-2 pb-2.5">';
                    h += '<div class="flex justify-between items-center"><span class="text-lg font-bold text-terra-500">' + (post.score||0) + '점</span><span class="text-[11px] text-warm-600">♡ ' + (post.likes_count||0) + '</span></div>';
                    if (style) h += '<div class="text-[11px] text-warm-600 mt-0.5">' + style + '</div>';
                    h += '<div class="text-[11px] text-warm-600 mt-0.5 flex items-center gap-1.5">' + (postAvatar ? '<img src="' + postAvatar + '" class="w-4 h-4 rounded-full object-cover">' : '') + '<span>@' + nick + (isFollowing ? ' ✓' : '') + '</span><span>' + ago + '</span></div>';
                    h += '</div></div>';
                });
                grid.innerHTML = h;

                if (status) {
                    if (this.comm.hasMore) {
                        status.innerHTML = '<button class="w-full py-3 mt-2 bg-white border border-warm-400 rounded-2xl text-sm font-medium text-warm-700 active:scale-[0.98] transition-all" onclick="app.communityLoad()">더 보기</button>';
                    } else {
                        status.innerHTML = '<div class="text-center py-3 text-warm-500 text-xs">모든 코디를 불러왔어요</div>';
                    }
                }
            },

            _timeAgo(dt) {
                if (!dt) return '';
                const diff = (Date.now() - new Date(dt).getTime()) / 1000;
                if (diff < 60) return '방금';
                if (diff < 3600) return Math.floor(diff/60) + '분 전';
                if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
                if (diff < 604800) return Math.floor(diff/86400) + '일 전';
                const d = new Date(dt);
                return (d.getMonth()+1) + '/' + d.getDate();
            },

            commSetStyle(v) { this.comm.styleFilter = v === 'all' ? null : v; this.communityLoad(true); },

                            : '<div class="w-10 h-10 rounded-full bg-terra-100 flex items-center justify-center text-terra-700 font-bold text-sm cursor-pointer" onclick="app.openUserProfile(\'' + post.user_id + '\')">' + initial + '</div>') +
                        '<div class="flex-1 cursor-pointer" onclick="app.openUserProfile(\'' + post.user_id + '\')">' +
                            '<div class="text-sm font-bold text-warm-900">@' + nick + (isMutual ? ' <span class="text-green-600 text-[10px]">👫</span>' : '') + '</div>' +
                            '<div class="text-xs text-warm-500">' + ago + '</div>' +
                        '</div>' +
                        followBtn +
                    '</div>' +

                    // 사진 (있으면)
                    (hasPhoto ? '<div class="rounded-[14px] overflow-hidden mb-3"><img src="' + photoUrl + '" class="w-full max-h-[280px] object-cover" onerror="this.parentElement.style.display=\'none\'"></div>' : '') +

                    // 마네킹
                    '<div class="flex justify-center py-5 bg-warm-200 rounded-[14px] mb-4">' + mn + '</div>' +

                    // 점수 + 스타일
                    '<div class="flex items-center gap-3 mb-3">' +
                        '<span class="font-display text-3xl font-bold text-terra-600">' + (post.score||0) + '점</span>' +
                        (style ? '<span class="text-[11px] text-warm-600 border border-warm-400 rounded-full px-2.5 py-0.5">' + style + '</span>' : '') +
                    '</div>' +

                    // 캡션
                    (post.caption ? '<div class="bg-warm-200 rounded-2xl p-3.5 text-sm text-warm-800 mb-3">' + escapeHtml(post.caption) + '</div>' : '') +

                    // 색상 스와치
                    '<div class="mb-3">' + swatches + '</div>' +

                    // 액션 버튼
                    '<div class="flex gap-2">' +
                        '<button class="flex-1 py-2.5 rounded-xl border border-warm-400 bg-white text-sm font-medium active:scale-[0.97] transition-all flex items-center justify-center gap-1' + (liked?' text-red-500 border-red-300':'') + '" onclick="app.commToggleLike(\'' + post.id + '\')">' + (liked?'❤️':'🤍') + ' ' + (post.likes_count||0) + '</button>' +
                        '<button class="flex-1 py-2.5 rounded-xl border border-warm-400 bg-white text-sm font-medium active:scale-[0.97] transition-all flex items-center justify-center gap-1' + (bookmarked?' text-terra-600 border-terra-300':'') + '" onclick="app.commToggleBookmark(\'' + post.id + '\')">' + (bookmarked?'🔖':'📄') + ' 저장</button>' +
                    '</div>' +
                '</div>';
            },

            async commToggleLike(postId) {
                if (!auth.user) { this.goTo('auth-login'); return; }
                if (!sb) return;
                if (!this._throttle('like_' + postId, 1000)) return;
                const liked = this.comm.myLikes.has(postId);
                try {
                    if (liked) {
                        await sb.from('likes').delete().eq('user_id', auth.user.id).eq('post_id', postId);
                        this.comm.myLikes.delete(postId);
                    } else {
                        await sb.from('likes').insert({ user_id: auth.user.id, post_id: postId });
                        this.comm.myLikes.add(postId);
                    }
                    // detail과 posts 배열은 같은 참조이므로 한 번만 업데이트
                    const p = this.comm.posts.find(x=>x.id===postId);
                    if (p) p.likes_count = liked ? Math.max(0,(p.likes_count||1)-1) : (p.likes_count||0)+1;
                    this.render();
                } catch(e) { console.error(e); }
            },

            async commToggleBookmark(postId) {
                const post = this.comm.posts.find(x=>x.id===postId) || this.comm.detail;
                if (!post) return;
                // localStorage cs_saved에 저장
                const saved = this.getSavedOutfits();
                const already = saved.find(s => s.commPostId === postId);
                if (already) {
                    // 이미 저장됨 → 제거
                    const newSaved = saved.filter(s => s.commPostId !== postId);
                    localStorage.setItem('cs_saved', JSON.stringify(newSaved));
                    this.comm.myBookmarks.delete(postId);
                    this.showShareToast('저장 목록에서 제거했어요');
                } else {
                    // 저장
                    if (saved.length >= 50) { alert('저장 가능한 코디는 최대 50개입니다'); return; }
                    const nick = escapeHtml(post.profiles?.nickname) || '유저';
                    saved.unshift({
                        id: 'comm_' + Date.now(),
                        commPostId: postId,
                        name: '@' + nick + '의 코디',
                        memo: post.caption || '',
                        outfit: post.outfit || {},
                        score: post.score || 0,
                        style: post.style || '',
                        layerType: post.layer_type || 'basic',
                        outerType: 'coat',
                        midType: 'knit',
                        createdAt: new Date().toISOString()
                    });
                    localStorage.setItem('cs_saved', JSON.stringify(saved));
                    this.comm.myBookmarks.add(postId);
                    this.showShareToast('내 코디에 저장했어요! 💾');
                }
                this.render();
            },

            // ── 커뮤니티에 코디 공유 ──
            openCommunityPost(source, idx) {
                if (!auth.user) { this.goTo('auth-login'); return; }
                if (source === 'build') {
                    const outfit = {};
                    Object.entries(this.build.colors).forEach(([k,v]) => { if(v) outfit[k]=v; });
                    this.comm.postOutfit = outfit;
                    this.comm.postScore = this._lastBuildScore || 0;
                    this.comm.postStyle = this.build.style || '';
                    this.comm.postLayerType = this.build.layerType || 'basic';
                    this.comm.postOuterType = this.build.outerType || 'coat';
                    this.comm.postMidType = this.build.midType || 'knit';
                } else if (source === 'rec') {
                    const combo = this.recommend.results[idx];
                    if (!combo) return;
                    this.comm.postOutfit = combo.outfit;
                    this.comm.postScore = combo.score || 0;
                    this.comm.postStyle = this.recommend.style || '';
                    this.comm.postLayerType = this.recommend.layerType || 'basic';
                    this.comm.postOuterType = this.recommend.outerType || 'coat';
                    this.comm.postMidType = this.recommend.midType || 'knit';
                }
                this.goTo('community-post');
            },

            renderCommunityPost() {
                const outfit = this.comm.postOutfit || {};
                const outfitHex = {};
                Object.entries(outfit).forEach(([k,v]) => { if(v) outfitHex[k] = COLORS_60[v]?.hex || null; });
                const mn = mannequinToImg(createMannequinSVG(outfitHex, { outerType: this.comm.postOuterType, midType: this.comm.postMidType }), 'height:160px');
                const style = this.comm.postStyle ? (STYLE_GUIDE[this.comm.postStyle]?.name || this.comm.postStyle) : '';

                return '<div class="screen active">' +
                    '<p class="text-sm text-warm-600 mb-4">이 코디를 커뮤니티에 공유해요</p>' +
                    '<div class="flex justify-center p-5 bg-warm-200 rounded-[14px] mb-4">' + mn + '</div>' +
                    '<div class="flex items-center gap-2.5 mb-3.5">' +
                        '<span class="font-display text-xl font-bold text-terra-600">' + (this.comm.postScore||0) + '점</span>' +
                        (style ? '<span class="text-[11px] text-warm-600 border border-warm-400 rounded-full px-2.5 py-0.5">' + style + '</span>' : '') +
                    '</div>' +
                    '<div class="text-[13px] font-medium text-warm-800 mb-1.5">한마디 (선택)</div>' +
                    '<textarea class="w-full px-3.5 py-3 bg-white border border-warm-400 rounded-xl text-sm focus:border-terra-400 focus:ring-1 focus:ring-terra-400 transition-all outline-none resize-none mb-4" rows="3" id="comm-caption" placeholder="이 코디에 대해 한마디..." maxlength="200"></textarea>' +
                    '<button class="w-full py-3.5 bg-terra-500 text-white rounded-2xl font-semibold text-sm shadow-terra active:scale-[0.98] transition-all flex items-center justify-center gap-1.5" id="comm-submit-btn" onclick="app.commSubmitPost()">' + svg('globe', 16, '#fff') + ' 공유하기</button>' +
                '</div>';
            },

            // 🔒 보안: Rate limiter (연타 방지)
            _lastAction: {},
            _throttle(key, ms) {
                const now = Date.now();
                if (this._lastAction[key] && (now - this._lastAction[key]) < ms) return false;
                this._lastAction[key] = now;
                return true;
            },

            async commSubmitPost() {
                if (!sb || !auth.user) return;
                if (!this._throttle('post', 3000)) { spToast('잠시 후 다시 시도해주세요'); return; }
                const btn = document.getElementById('comm-submit-btn');
                if (btn) { btn.disabled = true; btn.textContent = '공유 중...'; }

                try {
                    const rawCaption = (document.getElementById('comm-caption')?.value || '').trim();
                    const caption = sanitizeNickname(rawCaption) ? rawCaption.slice(0, 200) : null;
                    const { error } = await sb.from('posts').insert({
                        user_id: auth.user.id,
                        outfit: this.comm.postOutfit,
                        score: this.comm.postScore || 0,
                        style: this.comm.postStyle || null,
                        layer_type: this.comm.postLayerType || 'basic',
                        caption: caption || null,
                        tags: this.comm.postStyle ? [this.comm.postStyle] : []
                    });
                    if (error) throw error;
                    alert('커뮤니티에 공유되었어요! 🎉');
                    this.comm.posts = [];
                    this.comm.page = 0;
                    this.goTo('community');
                } catch(e) {
                    console.error('Post error:', e);
                    alert('공유 실패: ' + (e.message||'알 수 없는 오류'));
                    if (btn) { btn.disabled = false; btn.textContent = '🌐 공유하기'; }
                }
            },

            // ============================================================
            // 팔로우/친구 시스템 (#16, #17)
            // ============================================================
            _getFollows() {
                try { return JSON.parse(localStorage.getItem('sp_follows') || '[]'); } catch(e) { return []; }
            },
            _saveFollows(list) {
                localStorage.setItem('sp_follows', JSON.stringify(list));
                this.comm.myFollows = new Set(list);
            },
            _initFollows() {
                const list = this._getFollows();
                this.comm.myFollows = new Set(list);
            },
            _isFriend(userId) {
                // 맞팔 = 친구 (프로토타입: 내가 팔로우한 사람은 잠재 친구)
                // 실제로는 서버에서 상대방도 나를 팔로우하는지 확인 필요
                // 여기서는 localStorage에 friend로 마킹된 유저 확인
                try {
                    const friends = JSON.parse(localStorage.getItem('sp_friends') || '[]');
                    return friends.includes(userId);
                } catch(e) { return false; }
            },

            async commToggleFollow(userId) {
                if (!auth.user) { this.goTo('auth-login'); return; }
                if (!this._throttle('follow_' + userId, 1500)) return;
                const follows = this._getFollows();
                const idx = follows.indexOf(userId);
                if (idx >= 0) {
                    follows.splice(idx, 1);
                    // 친구 목록에서도 제거
                    try {
                        let friends = JSON.parse(localStorage.getItem('sp_friends') || '[]');
                        friends = friends.filter(f => f !== userId);
                        localStorage.setItem('sp_friends', JSON.stringify(friends));
                    } catch(e) {}
                    this.showShareToast('팔로우를 취소했어요');
                } else {
                    follows.push(userId);
                    // 알림 추가
                    this._addNotification('follow', '새로운 팔로우!', userId);
                    this.showShareToast('팔로우했어요! ✓');

                    // 맞팔 확인 시뮬레이션 (서버에서 확인해야 하지만, 프로토타입에서는 50% 확률)
                    if (sb) {
                        try {
                            const { data } = await sb.from('follows').select('id').eq('follower_id', userId).eq('following_id', auth.user.id).limit(1);
                            if (data && data.length > 0) {
                                let friends = JSON.parse(localStorage.getItem('sp_friends') || '[]');
                                if (!friends.includes(userId)) friends.push(userId);
                                localStorage.setItem('sp_friends', JSON.stringify(friends));
                                this._addNotification('friend', '새 친구가 됐어요! 👫', userId);
                            }
                        } catch(e) {}
                    }
                }
                this._saveFollows(follows);

                // 서버 동기화
                if (sb && auth.user) {
                    try {
                        if (idx >= 0) {
                            await sb.from('follows').delete().eq('follower_id', auth.user.id).eq('following_id', userId);
                        } else {
                            await sb.from('follows').upsert({ follower_id: auth.user.id, following_id: userId });
                        }
                    } catch(e) { console.error('Follow sync error:', e); }
                }
                this.render();
            },

            // ── 유저 프로필 ──
            _viewingUser: null,
            openUserProfile(userId) {
                this._viewingUser = userId;
                this.goTo('user-profile');
            },

            renderUserProfile() {
                const userId = this._viewingUser;
                if (!userId) return '<div class="screen active"><div class="text-center py-10 text-warm-600">유저를 찾을 수 없습니다</div></div>';

                const isFollowing = this.comm.myFollows.has(userId);
                const isMutual = this._isFriend(userId);

                // 해당 유저의 포스트 수집
                const userPosts = this.comm.posts.filter(p => p.user_id === userId);
                const nick = escapeHtml(userPosts[0]?.profiles?.nickname) || '유저';
                const userAvatar = userPosts[0]?.profiles?.avatar_url;
                const initial = nick.charAt(0).toUpperCase();

                // 팔로우 버튼
                const isMe = auth.user && auth.user.id === userId;
                let followBtn = '';
                if (!isMe) {
                    if (isMutual) {
                        followBtn = '<button class="px-5 py-2 rounded-full text-xs font-semibold bg-green-100 text-green-700 border border-green-300">👫 친구</button>';
                    } else if (isFollowing) {
                        followBtn = '<button onclick="app.commToggleFollow(\'' + userId + '\')" class="px-5 py-2 rounded-full text-xs font-semibold bg-warm-200 text-warm-700 border border-warm-400 active:scale-95 transition-all">팔로잉 ✓</button>';
                    } else {
                        followBtn = '<button onclick="app.commToggleFollow(\'' + userId + '\')" class="px-5 py-2 rounded-full text-xs font-semibold bg-terra-500 text-white active:scale-95 transition-all shadow-terra">팔로우</button>';
                    }
                }

                let h = '<div class="screen active">';
                // 프로필 카드
                h += '<div class="text-center py-6">';
                h += (userAvatar
                    ? '<img src="' + userAvatar + '" class="w-16 h-16 rounded-full object-cover mx-auto mb-3" onerror="this.outerHTML=\'<div class=\\\'w-16 h-16 rounded-full bg-terra-100 flex items-center justify-center text-terra-700 font-bold text-xl mx-auto mb-3\\\'>' + initial + '</div>\'">'
                    : '<div class="w-16 h-16 rounded-full bg-terra-100 flex items-center justify-center text-terra-700 font-bold text-xl mx-auto mb-3">' + initial + '</div>');
                h += '<div class="text-lg font-bold text-warm-900 mb-1">@' + nick + '</div>';
                if (isMutual) h += '<div class="text-xs text-green-600 font-medium mb-2">👫 서로 친구</div>';
                h += '<div class="flex justify-center gap-6 mb-4 text-center">';
                h += '<div><div class="font-display text-lg font-bold text-warm-900">' + userPosts.length + '</div><div class="text-[10px] text-warm-500">코디</div></div>';
                h += '</div>';
                h += followBtn;
                h += '</div>';

                // 유저의 코디 그리드
                if (userPosts.length > 0) {
                    h += '<div class="border-t border-warm-300 pt-4 mt-2">';
                    h += '<div class="text-xs font-semibold text-warm-600 uppercase tracking-wider mb-3">코디 목록</div>';
                    h += '<div class="grid grid-cols-3 gap-1.5">';
                    userPosts.forEach((post, idx) => {
                        const realIdx = this.comm.posts.indexOf(post);
                        const outfit = post.outfit || {};
                        const outfitHex = {};
                        Object.entries(outfit).forEach(([k,v]) => { if(v) outfitHex[k] = COLORS_60[v]?.hex || v; });
                        const mn = mannequinToImg(createMannequinSVG(outfitHex, {}), 'height:50px');
                        h += '<div class="bg-warm-200 rounded-xl p-2 flex justify-center items-center min-h-[70px] cursor-pointer active:scale-95 transition-transform" onclick="app.openCommDetail(' + realIdx + ')">' + mn + '</div>';
                    });
                    h += '</div></div>';
                } else {
                    h += '<div class="text-center py-8 text-warm-500 text-sm">이 유저의 공유된 코디가 피드에 없어요</div>';
                }

                h += '</div>';
                return h;
            },

            // ============================================================
            // 인앱 알림 시스템 (#19)
            // ============================================================
            _initNotifications() {
                try { this.notifications = JSON.parse(localStorage.getItem('sp_notifications') || '[]'); } catch(e) { this.notifications = []; }
            },
            _addNotification(type, message, relatedId) {
                const noti = {
                    id: Date.now().toString(36),
                    type: type, // 'like', 'follow', 'friend', 'badge', 'level', 'challenge'
                    message: message,
                    relatedId: relatedId || null,
                    createdAt: new Date().toISOString(),
                    read: false
                };
                this.notifications.unshift(noti);
                if (this.notifications.length > 50) this.notifications = this.notifications.slice(0, 50);
                localStorage.setItem('sp_notifications', JSON.stringify(this.notifications));
            },

            renderNotifications() {
                const notis = this.notifications;

                // 열람 시 모두 읽음 처리
                notis.forEach(n => n.read = true);
                localStorage.setItem('sp_notifications', JSON.stringify(notis));

                if (notis.length === 0) {
                    return '<div class="screen active"><div class="text-center py-16">' +
                        '<div class="w-16 h-16 rounded-full bg-warm-300 flex items-center justify-center mx-auto mb-4">' + svg("bell", 28, "#A8A29E") + '</div>' +
                        '<div class="text-[15px] text-warm-700 leading-relaxed">아직 알림이 없어요<br>활동하면 알림이 여기에 표시됩니다</div>' +
                    '</div></div>';
                }

                const typeIcons = { like:'❤️', follow:'👤', friend:'👫', badge:'🏅', level:'⬆️', challenge:'🎯' };
                let h = '<div class="screen active">';
                h += '<div class="text-sm text-warm-600 mb-4">총 ' + notis.length + '개의 알림</div>';

                // 오늘 / 이전
                const today = new Date().toDateString();
                let todayNotis = [], olderNotis = [];
                notis.forEach(n => {
                    if (new Date(n.createdAt).toDateString() === today) todayNotis.push(n);
                    else olderNotis.push(n);
                });

                if (todayNotis.length > 0) {
                    h += '<div class="text-xs font-semibold text-warm-500 uppercase tracking-wider mb-2">오늘</div>';
                    todayNotis.forEach(n => {
                        h += '<div class="flex items-center gap-3 py-3 border-b border-warm-300">';
                        h += '<span class="text-lg">' + (typeIcons[n.type] || '📢') + '</span>';
                        h += '<div class="flex-1"><div class="text-sm text-warm-900">' + n.message + '</div><div class="text-[10px] text-warm-500 mt-0.5">' + this._timeAgo(n.createdAt) + '</div></div>';
                        h += '</div>';
                    });
                }

                if (olderNotis.length > 0) {
                    h += '<div class="text-xs font-semibold text-warm-500 uppercase tracking-wider mb-2 mt-4">이전</div>';
                    olderNotis.forEach(n => {
                        h += '<div class="flex items-center gap-3 py-3 border-b border-warm-300">';
                        h += '<span class="text-lg">' + (typeIcons[n.type] || '📢') + '</span>';
                        h += '<div class="flex-1"><div class="text-sm text-warm-800">' + n.message + '</div><div class="text-[10px] text-warm-500 mt-0.5">' + this._timeAgo(n.createdAt) + '</div></div>';
                        h += '</div>';
                    });
                }

                h += '<button onclick="app.notifications=[];localStorage.removeItem(\'sp_notifications\');app.render()" class="w-full mt-4 py-2.5 text-xs text-warm-500 text-center active:text-warm-700 transition-colors">모두 지우기</button>';
                h += '</div>';
                return h;
            },

            // ── 인증 화면 ──
            renderAuthLogin() {
                return `<div class="screen active">
                <div class="max-w-sm mx-auto pt-8">
                    <div class="text-center mb-8">
                        <div class="w-16 h-16 rounded-full bg-terra-100 flex items-center justify-center mx-auto mb-4">
                            ${svg("shirt", 28, "#A8613F")}
                        </div>
                        <h2 class="font-display text-2xl font-bold text-warm-900 tracking-tight">바루픽</h2>
                        <p class="text-sm text-warm-600 mt-1">커뮤니티에 참여하세요</p>
                    </div>

                    <!-- 소셜 로그인 (#3) -->
                    <div class="flex flex-col gap-2.5 mb-5">
                        <button onclick="app.authSocial('kakao')" class="w-full flex items-center justify-center gap-2.5 py-3.5 rounded-2xl font-semibold text-sm active:scale-[0.98] transition-all" style="background:#FEE500;color:#191919">
                            <svg width="18" height="18" viewBox="0 0 24 24"><path d="M12 3C6.5 3 2 6.58 2 11c0 2.84 1.87 5.33 4.69 6.75-.16.56-.6 2.05-.69 2.37-.11.4.15.39.31.28.13-.08 2.07-1.37 2.91-1.93.9.13 1.83.2 2.78.2 5.5 0 10-3.58 10-8s-4.5-8-10-8z" fill="#191919"/></svg>
                            카카오 로그인

            async authDoLogin() {
                const email = document.getElementById('auth-email')?.value?.trim();
                const pw = document.getElementById('auth-pw')?.value;
                const errEl = document.getElementById('auth-error');
                const btn = document.getElementById('auth-submit-btn');
                if (!email || !pw) { if(errEl){errEl.style.display='block';errEl.textContent='이메일과 비밀번호를 입력해주세요';} return; }
                if (btn) { btn.disabled = true; btn.textContent = '로그인 중...'; }
                try {
                    await auth.login(email, pw);
                    this.goTo('community');
                } catch(e) {
                    if(errEl){errEl.style.display='block';errEl.textContent=e.message==='Invalid login credentials'?'이메일 또는 비밀번호가 올바르지 않습니다':e.message||'로그인 실패';}
                    if(btn){btn.disabled=false;btn.textContent='로그인';}
                }
            },

            async authDoSignup() {
                const rawNick = document.getElementById('auth-nick')?.value?.trim();
                const nick = sanitizeNickname(rawNick);
                const email = document.getElementById('auth-email')?.value?.trim();
                const pw = document.getElementById('auth-pw')?.value;
                const agreed = document.getElementById('auth-agree')?.checked;
                const errEl = document.getElementById('auth-error');
                const btn = document.getElementById('auth-submit-btn');
                if (!nick || nick.length < 2) { if(errEl){errEl.style.display='block';errEl.textContent='닉네임을 2자 이상 입력해주세요 (특수문자 제외)';} return; }
                if (!email || !pw) { if(errEl){errEl.style.display='block';errEl.textContent='이메일과 비밀번호를 입력해주세요';} return; }
                if (pw.length < 6) { if(errEl){errEl.style.display='block';errEl.textContent='비밀번호는 6자리 이상이어야 합니다';} return; }
                if (!agreed) { if(errEl){errEl.style.display='block';errEl.textContent='이용약관 및 개인정보처리방침에 동의해주세요';} return; }
                if (btn) { btn.disabled = true; btn.textContent = '가입 중...'; }
                try {
                    await auth.signup(email, pw, nick);
                    alert('가입이 완료되었어요! 🎉\n이메일 인증 후 로그인해주세요.');
                    this.goTo('auth-login');
                } catch(e) {
                    if(errEl){errEl.style.display='block';errEl.textContent=e.message||'가입 실패';}
                    if(btn){btn.disabled=false;btn.textContent='가입하기';}
                }
            },

            // 프로필 편집 (#2.5)
            async changeAvatar() {
                if (!sb || !auth.user) return;
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    if (file.size > 2 * 1024 * 1024) { spToast('이미지는 2MB 이하만 가능해요'); return; }

                    try {
                        spToast('업로드 중...');
                        const ext = file.name.split('.').pop() || 'jpg';
                        const path = 'avatars/' + auth.user.id + '.' + ext;

                        // Storage에 업로드
                        const { error: upErr } = await sb.storage.from('avatars').upload(path, file, { upsert: true, contentType: file.type });
                        if (upErr) throw upErr;

                        // Public URL 가져오기
                        const { data: urlData } = sb.storage.from('avatars').getPublicUrl(path);
                        const avatarUrl = urlData.publicUrl + '?t=' + Date.now();

                        // profiles 테이블 업데이트
                        const { error: dbErr } = await sb.from('profiles').update({ avatar_url: avatarUrl }).eq('id', auth.user.id);
                        if (dbErr) throw dbErr;

                        auth.profile.avatar_url = avatarUrl;
                        spToast('프로필 사진이 변경되었어요 📸');
                        this.render();
                    } catch(e) {
                        console.error('Avatar upload error:', e);
                        spToast('업로드 실패: ' + (e.message || ''));
                    }
                };
                input.click();
            },

            async editNickname() {
                if (!sb || !auth.user) return;
                const current = auth.profile?.nickname || '';
                const newNick = prompt('닉네임을 입력해주세요 (2~12자)', current);
                if (!newNick || newNick.trim() === current) return;
                const clean = sanitizeNickname(newNick);
                if (clean.length < 2) { spToast('닉네임은 2자 이상이어야 해요'); return; }

                try {
                    const { error } = await sb.from('profiles').update({ nickname: clean }).eq('id', auth.user.id);
                    if (error) throw error;
                    auth.profile.nickname = clean;
                    spToast('닉네임이 변경되었어요 ✏️');
                    this.render();
                } catch(e) {
                    console.error('Nickname update error:', e);
                    spToast('변경 실패: ' + (e.message || ''));
                }
            },

            async editBio() {
                if (!sb || !auth.user) return;
                const current = auth.profile?.bio || '';
                const newBio = prompt('소개글을 입력해주세요 (최대 60자)', current);
                if (newBio === null) return;
                const clean = newBio.trim().slice(0, 60);

                try {
                    const { error } = await sb.from('profiles').update({ bio: clean || null }).eq('id', auth.user.id);
                    if (error) throw error;
                    auth.profile.bio = clean;
                    spToast(clean ? '소개글이 저장되었어요 ✨' : '소개글이 삭제되었어요');
                    this.render();
                } catch(e) {
                    console.error('Bio update error:', e);
                    spToast('변경 실패: ' + (e.message || ''));
                }
            },

            // 소셜 로그인 (#3)
            async authSocial(provider) {
                if (!sb) { alert('서버 연결에 실패했어요. 잠시 후 다시 시도해주세요.'); return; }
                try {
                    var isNative = window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform();
                    var redirectUrl = isNative ? 'com.barupick.app://callback' : window.location.origin + window.location.pathname;
                    const { error } = await sb.auth.signInWithOAuth({
                        provider: provider,
                        options: {
                            redirectTo: redirectUrl,
                            queryParams: provider === 'kakao' ? { prompt: 'login' } : {}
                        }
                    });
                    if (error) throw error;
                } catch(e) {
                    console.error('Social login error:', e);
                    alert('소셜 로그인에 실패했어요: ' + (e.message || '알 수 없는 오류'));
                }
            },

            // 계정 삭제 (#4)
            async deleteAccount() {
                const step1 = confirm('정말 계정을 삭제하시겠어요?\n\n• 모든 코디 기록이 삭제됩니다\n• 커뮤니티 게시물이 삭제됩니다\n• 이 작업은 되돌릴 수 없습니다');
                if (!step1) return;
                const step2 = prompt('확인을 위해 "계정삭제"를 입력해주세요:');
                if (step2 !== '계정삭제') { spToast('계정 삭제가 취소되었어요'); return; }

                try {
                    if (sb && auth.user) {
                        // DB Function으로 auth.users 삭제 → CASCADE로 모든 데이터 자동 삭제
                        const { error } = await sb.rpc('delete_own_account');
                        if (error) throw error;
                    }
                    // 로컬 데이터 전체 삭제
                    localStorage.clear();
                    alert('계정이 삭제되었어요. 이용해주셔서 감사합니다.');
                    location.reload();
                } catch(e) {
                    console.error('Account delete error:', e);
                    alert('계정 삭제 중 오류가 발생했어요: ' + (e.message || ''));
                }
            },

            async authLogout() {
                await auth.logout();
                this.render();
            },

            // ============================================================
            // #5 온보딩/튜토리얼
            // ============================================================
            showOnboarding() {
                const slides = [
                    { emoji: '👋', title: '바루픽에 오신 걸\n환영해요!', desc: 'HCL 색상 과학 기반으로\n나에게 딱 맞는 코디를 추천해 드려요', bg: 'linear-gradient(135deg,#FDE8DE,#FAEEE8)' },
                    { emoji: '🎨', title: '퍼스널컬러 진단', desc: '빛 투사 방식으로\n정확한 퍼스널컬러를 찾아보세요\n12가지 시즌 분류 지원', bg: 'linear-gradient(135deg,#E8F0FE,#F0E8FE)' },
                    { emoji: '👔', title: '코디 추천 & 직접 코디', desc: 'AI가 추천하는 색상 조합이나\n직접 색상을 골라 나만의 코디를 완성하세요', bg: 'linear-gradient(135deg,#E8FEE8,#E8FEED)' },
                    { emoji: '📸', title: 'OOTD 기록', desc: '매일의 코디를 기록하고\n캘린더에서 한눈에 확인하세요\n사진과 마네킹 모두 지원', bg: 'linear-gradient(135deg,#FEF3E8,#FEE8E8)' },
                    { emoji: '🌐', title: '커뮤니티 & 성장', desc: '다른 유저의 코디를 구경하고\n배지·레벨·챌린지로 성장해보세요', bg: 'linear-gradient(135deg,#E8ECFE,#FEE8F3)' }
                ];

                const ov = document.createElement('div');
                ov.id = 'onboardOverlay';
                ov.style.cssText = 'position:fixed;inset:0;z-index:10000;background:#F7F5F2;display:flex;flex-direction:column;overflow:hidden;';

                let dotsH = slides.map((_,i) => '<div class="ob-dot' + (i===0?' active':'') + '" data-i="' + i + '"></div>').join('');

                ov.innerHTML = `
                    <style>
                        .ob-slide-wrap{display:flex;transition:transform 0.35s cubic-bezier(.4,0,.2,1);width:${slides.length*100}%;height:100%}
                        .ob-slide{width:${100/slides.length}%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center}
                        .ob-dots{display:flex;gap:8px;justify-content:center;padding:16px}
                        .ob-dot{width:8px;height:8px;border-radius:50%;background:#D6D3D1;transition:all 0.3s}
                        .ob-dot.active{width:24px;border-radius:4px;background:#C2785C}
                    </style>
                    <div class="ob-slide-wrap" id="obSlides">
                        ${slides.map((s,i) => `
                            <div class="ob-slide" style="background:${s.bg}">
                                <div style="font-size:64px;margin-bottom:20px">${s.emoji}</div>
                                <div style="font-family:'Outfit','Noto Sans KR',sans-serif;font-size:24px;font-weight:700;color:#1C1917;line-height:1.3;white-space:pre-line;margin-bottom:14px">${s.title}</div>
                                <div style="font-size:15px;color:#57534E;line-height:1.6;white-space:pre-line">${s.desc}</div>
                            </div>`).join('')}
                    </div>
                    <div style="padding:16px 32px 40px;flex-shrink:0">
                        <div class="ob-dots" id="obDots">${dotsH}</div>
                        <button id="obNextBtn" onclick="app._obNext()" style="width:100%;padding:16px;border-radius:16px;background:#C2785C;color:#fff;font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:'Outfit','Noto Sans KR',sans-serif">다음</button>
                        <button onclick="app._obSkip()" style="width:100%;padding:12px;background:transparent;border:none;color:#A8A29E;font-size:13px;cursor:pointer;margin-top:6px">건너뛰기</button>
                    </div>`;
                document.body.appendChild(ov);

                this._obIdx = 0;
                this._obMax = slides.length;

                // 터치 스와이프
                let sx = 0;
                const wrap = ov.querySelector('#obSlides');
                wrap.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, { passive: true });
                wrap.addEventListener('touchend', e => {
                    const diff = sx - e.changedTouches[0].clientX;
                    if (Math.abs(diff) > 50) {
                        if (diff > 0 && this._obIdx < this._obMax - 1) this._obIdx++;
                        else if (diff < 0 && this._obIdx > 0) this._obIdx--;
                        this._obUpdate();
                    }
                }, { passive: true });
            },

            _obNext() {
                if (this._obIdx < this._obMax - 1) {
                    this._obIdx++;
                    this._obUpdate();
                } else {
                    this._obSkip();
                }
            },

            _obUpdate() {
                const wrap = document.getElementById('obSlides');
                if (wrap) wrap.style.transform = 'translateX(-' + (this._obIdx * (100 / this._obMax)) + '%)';
                document.querySelectorAll('.ob-dot').forEach((d,i) => d.classList.toggle('active', i === this._obIdx));
                const btn = document.getElementById('obNextBtn');
                if (btn) btn.textContent = this._obIdx === this._obMax - 1 ? '시작하기 🎉' : '다음';
            },

            _obSkip() {
                localStorage.setItem('sp_onboarded', '1');
                const ov = document.getElementById('onboardOverlay');
                if (ov) ov.remove();
                this.render();
            },

                    var avoidStartX = (W - avoidTotalW) / 2 + dotR;
                    avoidColors.forEach(function (ck, idx) {
                        var c = COLORS_60[ck];
                        var cx = avoidStartX + idx * (dotR * 2 + dotGap);
                        var cy = y + dotR;
                        ctx.globalAlpha = 0.5;
                        ctx.fillStyle = c.hex;
                        ctx.beginPath(); ctx.arc(cx, cy, dotR, 0, Math.PI * 2); ctx.fill();
                        ctx.globalAlpha = 1;
                        ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.arc(cx, cy, dotR, 0, Math.PI * 2); ctx.stroke();
                        // X 표시
                        ctx.strokeStyle = 'rgba(192,57,43,0.7)'; ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.moveTo(cx - 8, cy - 8); ctx.lineTo(cx + 8, cy + 8); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(cx + 8, cy - 8); ctx.lineTo(cx - 8, cy + 8); ctx.stroke();
                        ctx.font = '400 9px -apple-system,BlinkMacSystemFont,sans-serif';
                        ctx.fillStyle = '#999'; ctx.textAlign = 'center';
                        ctx.fillText(c.name, cx, cy + dotR + 12);
                    });
                }

                // 하단 바루사 브랜딩
                ctx.fillStyle = '#1A1A1A'; ctx.fillRect(0, H - 56, W, 56);
                ctx.font = '600 14px -apple-system,BlinkMacSystemFont,sans-serif';
                ctx.fillStyle = '#FFFFFF'; ctx.textAlign = 'center';
                ctx.fillText('바루픽', W / 2, H - 26);

                canvas.toBlob(function (blob) { callback(blob); }, 'image/png');
            },

            generateShareCard(outfit, title, parts, callback) {
                var canvas = document.createElement('canvas');
                var W = 640, H = 960;
                canvas.width = W; canvas.height = H;
                var ctx = canvas.getContext('2d');

                var grad = ctx.createLinearGradient(0, 0, 0, H);
                grad.addColorStop(0, '#FAFAF8'); grad.addColorStop(1, '#F0EDE8');
                ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#1A1A1A'; ctx.fillRect(0, 0, W, 4);
                ctx.fillStyle = '#1A1A1A'; ctx.font = '600 13px -apple-system,BlinkMacSystemFont,sans-serif';
                ctx.textAlign = 'center'; ctx.fillText('BARUSA COLOR STUDIO', W / 2, 40);
                ctx.font = '700 28px -apple-system,BlinkMacSystemFont,sans-serif';
                ctx.fillText('🎨 ' + title, W / 2, 80);

                var hex = outfitToHex(outfit);
                var svgStr = createMannequinSVG(hex, { outerType: this.build?.outerType || 'coat', midType: this.build?.midType || 'knit' });
                var svgBlob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
                var svgUrl = URL.createObjectURL(svgBlob);
                var img = new Image();

                img.onload = function () {
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.beginPath(); ctx.arc(W / 2, 360, 180, 0, Math.PI * 2); ctx.fill();
                    var mH = 380, mW = mH * (300 / 500);
                    ctx.drawImage(img, (W - mW) / 2, 160, mW, mH);
                    URL.revokeObjectURL(svgUrl);

                    var cardY = 570, cardH = parts.length * 44 + 24;
                    ctx.fillStyle = '#FFFFFF';
                    roundRect(ctx, 60, cardY, W - 120, cardH, 16); ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 1;
                    roundRect(ctx, 60, cardY, W - 120, cardH, 16); ctx.stroke();

                    parts.forEach(function (p, i) {
                        var y = cardY + 28 + i * 44;
                        var c = COLORS_60[p[1]], cHex = c?.hex || '#ccc', cName = c?.name || p[1];
                        ctx.fillStyle = cHex; ctx.beginPath(); ctx.arc(100, y, 14, 0, Math.PI * 2); ctx.fill();
                        ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.arc(100, y, 14, 0, Math.PI * 2); ctx.stroke();
                        ctx.textAlign = 'left'; ctx.font = '600 15px -apple-system,BlinkMacSystemFont,sans-serif';
                        ctx.fillStyle = '#1A1A1A'; ctx.fillText(p[0], 128, y + 5);
                        ctx.font = '400 14px -apple-system,BlinkMacSystemFont,sans-serif';
                        ctx.fillStyle = '#888'; ctx.textAlign = 'right'; ctx.fillText(cName, W - 100, y + 5);
                    });

                    ctx.fillStyle = '#1A1A1A'; ctx.fillRect(0, H - 56, W, 56);
                    ctx.font = '600 14px -apple-system,BlinkMacSystemFont,sans-serif';
                    ctx.fillStyle = '#FFFFFF'; ctx.textAlign = 'center';
                    ctx.fillText('바루픽', W / 2, H - 26);
                    canvas.toBlob(function (blob) { callback(blob); }, 'image/png');
                };
                img.onerror = function () { URL.revokeObjectURL(svgUrl); callback(null); };
                img.src = svgUrl;
            }
        };

        // ============================================================

        // 앱 시작
        // ============================================================
        document.addEventListener('DOMContentLoaded', async () => {
            // 다크 모드 / 접근성 설정 복원
            if (localStorage.getItem('sp_dark_mode') === '1') {
                document.documentElement.classList.add('dark-mode');
                var mc = document.querySelector('meta[name="theme-color"]');
                if (mc) mc.setAttribute('content', '#1C1917');
            }
            if (localStorage.getItem('sp_a11y_labels') === '1') document.documentElement.classList.add('a11y-labels');

            await auth.init();
            app._initFollows();
            app._initNotifications();

            // 온보딩 체크 (#5)
            if (!localStorage.getItem('sp_onboarded')) {
                app.showOnboarding();
            } else {
                app.render();
            }
        });

    </script>
</body>

</html>
