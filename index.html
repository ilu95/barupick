            _getFitTags(outfit) {
                const fitOn = profile.getFitMode();
                if (!fitOn) return { pc: false, body: false };
                const pc = profile.getPersonalColor();
                const bt = profile.getBodyType();
                let pcMatch = false, bodyMatch = false;
                if (pc && PERSONAL_COLOR_12[pc]) {
                    const best = PERSONAL_COLOR_12[pc].bestColors || [];
                    FACE_NEAR_ITEMS.forEach(item => {
                        if (outfit[item] && best.includes(outfit[item])) pcMatch = true;
                    });
                }
                if (bt && BODY_GUIDE_DATA[bt]?.colorRules) {
                    const rules = BODY_GUIDE_DATA[bt].colorRules;
                    let match = 0, total = 0;
                    Object.entries(outfit).forEach(([part, colorKey]) => {
                        if (!colorKey) return;
                        const rule = rules[part];
                        if (!rule || rule === 'any') return;
                        total++;
                        if (this._checkBodyMatch(rule, colorKey)) match++;
                    });
                    if (total > 0 && match / total >= 0.5) bodyMatch = true;
                }
                return { pc: pcMatch, body: bodyMatch };
            },

            selectBuildColor(colorKey) {
                // 수정 모드: 결과 화면으로 바로 복귀
                if (this._editMode) {
                    if (this._editSource === 'rec') {
                        this.recommend.results[this._editRecIdx].outfit[this._editMode] = colorKey;
                        // 점수 재계산
                        var outfit = this.recommend.results[this._editRecIdx].outfit;
                        var pc = profile.getPersonalColor();
                        this.recommend.results[this._editRecIdx].score = evaluationSystem.evaluate(outfit, pc).total;
                        this._editMode = null;
                        this._editSource = null;
                        this._editOutfit = null;
                        this.currentScreen = 'rec-detail';
                        this.render();
                        return;
                    }
                    this.build.colors[this._editMode] = colorKey;
                    this._editMode = null;
                    this._editSource = null;
                    this._editOutfit = null;
                    this.currentScreen = 'build-result';
                    this.render();
                    return;
                }
                // 뒤로가기용 히스토리 저장
                this.build.history.push({
                    colors: JSON.parse(JSON.stringify(this.build.colors)),
                    currentItem: this.build.currentItem,
                    itemQueue: JSON.parse(JSON.stringify(this.build.itemQueue))
                });

                this.build.colors[this.build.currentItem] = colorKey;
                this.build.itemQueue.shift();

                // 소재 모드 ON이고, 이 부위에 소재 아이템이 있으면 소재 선택 단계 삽입
                if (this.build.fabricMode && FABRIC_ITEMS[this.build.currentItem]) {
                    this.currentScreen = 'build-fabric';
                    this.render();
                    return;
                }

                this.processNextBuildItem();
            },

            editBuildPart(cat) {
                this._editMode = cat;
                this._editSource = 'build';
                this.build.currentItem = cat;
                // 현재 점수 저장
                var outfit = {};
                Object.entries(this.build.colors).forEach(function (e) { if (e[1]) outfit[e[0]] = e[1]; });
                var pc = profile.getPersonalColor();
                this._editBaseScore = evaluationSystem.evaluate(outfit, pc).total;
                this._editOutfit = outfit;
                this.currentScreen = 'build-color';
                this.render();
            },

            calcScoreDelta(colorKey) {
                if (!this._editMode || !this._editOutfit) return null;
                var testOutfit = Object.assign({}, this._editOutfit);
                testOutfit[this._editMode] = colorKey;
                var pc = profile.getPersonalColor();
                var newScore = evaluationSystem.evaluate(testOutfit, pc).total;
                return newScore - this._editBaseScore;
            },

            processNextBuildItem() {
                if (this.build.itemQueue.length === 0) {
                    this.currentScreen = 'build-result';
                    this.render();
                    return;
                }

                const next = this.build.itemQueue[0];
                if (typeof next === 'object' && next.askFirst) {
                    this.build.currentItem = next.item;
                    this.currentScreen = 'build-ask';
                } else {
                    this.build.currentItem = next;
                    this.currentScreen = 'build-color';
                }
                this.render();
            },

            // 현재 월에서 계절 자동 감지
            _getCurrentSeason() {
                const m = new Date().getMonth(); // 0-11
                if (m >= 2 && m <= 4) return 'spring';
                if (m >= 5 && m <= 7) return 'summer';
                if (m >= 8 && m <= 10) return 'fall';
                return 'winter';
            },

            renderBuildFabric() {
                const part = this.build.currentItem;
                const items = FABRIC_ITEMS[part] || [];
                const season = this._getCurrentSeason();
                const colorKey = this.build.colors[part];
                const colorName = colorKey ? (COLORS_60[colorKey]?.name || '') : '';

                // 이전에 선택한 소재들
                const prevFabrics = Object.entries(this.build.fabricSelections)
                    .filter(([k, v]) => v && k !== part)
                    .map(([k, v]) => ({ part: k, item: v }));

                let html = `<div class="screen active p-4">
                    <div class="text-center py-1 pb-3">
                        <div class="flex justify-center mb-1">${partSvg(part, 24, '#C2785C')}</div>
                        <h2 class="font-display text-[17px] font-bold text-warm-900 mb-1">${CATEGORY_NAMES[part]} 소재 선택</h2>
                        ${colorName ? `<p class="text-xs text-warm-600">선택한 색상: ${colorName} · ${FABRIC_SEASONS[season]?.emoji || ''} ${FABRIC_SEASONS[season]?.name || ''} 기준</p>` : ''}
                    </div>`;

                // 이전 선택 요약
                if (prevFabrics.length > 0) {
                    html += '<div class="flex flex-wrap gap-1.5 mb-3">';
                    for (const ps of prevFabrics) {
                        html += `<span class="inline-flex items-center gap-1 px-2.5 py-1 bg-terra-50 border border-terra-200 rounded-full text-xs font-medium text-terra-700">${partSvg(ps.part, 12, '#A8613F')} ${ps.item.name}</span>`;
                    }
                    html += '</div>';
                }

                // 계절 적합 아이템 먼저, 비적합 뒤에
                const seasonItems = items.filter(it => it.seasons.includes(season));
                const offSeasonItems = items.filter(it => !it.seasons.includes(season));

                html += '<div class="flex flex-col gap-2">';

                for (const item of [...seasonItems, ...offSeasonItems]) {
                    const seasonMatch = item.seasons.includes(season);
                    let seasonWarnHtml = !seasonMatch ? `<div class="text-[10px] text-yellow-600 mt-0.5">⚠️ ${FABRIC_SEASONS[season]?.name}에 맞지 않는 소재</div>` : '';

                    // 이전 선택과 궁합
                    let compatHtml = '';
                    if (prevFabrics.length > 0) {
                        let worstRating = 'great';
                        for (const ps of prevFabrics) {
                            const compat = getFabricCompat(item, ps.item);
                            if (compat) {
                                if (compat.rating === 'bad') worstRating = 'bad';
                                else if (compat.rating === 'ok' && worstRating !== 'bad') worstRating = 'ok';
                            }
                        }
                        const labels = { great: '✅ 추천', ok: '⚠️ 주의', bad: '❌ 비추' };
                        const compatColors = { great: 'bg-green-500/10 text-green-600', ok: 'bg-yellow-500/10 text-yellow-700', bad: 'bg-red-500/10 text-red-600' };
                        compatHtml = `<span class="flex-shrink-0 text-[11px] font-bold px-2 py-1 rounded-lg text-center ${compatColors[worstRating]}">${labels[worstRating]}</span>`;
                    }

                    html += `<div class="flex items-center gap-3 px-4 py-3.5 rounded-[14px] border-[1.5px] border-warm-400 bg-white cursor-pointer active:scale-[0.98] transition-all" onclick="app.selectBuildFabric('${part}','${item.id}')" ${!seasonMatch ? 'style="opacity:0.55"' : ''}>
                        <span class="text-[28px] flex-shrink-0">${item.icon}</span>
                        <div class="flex-1 min-w-0">
                            <div class="text-[15px] font-bold mb-0.5">${item.name}</div>
                            <div class="text-xs text-warm-700">${item.desc}</div>
                            ${seasonWarnHtml}
                        </div>
                        ${compatHtml}
                    </div>`;
                }

                html += '</div>';
                html += `<button class="w-full mt-3 py-3.5 bg-white border border-warm-400 text-warm-700 rounded-2xl font-medium text-sm active:scale-[0.98] transition-all" onclick="app.skipBuildFabric()">소재 건너뛰기 →</button>`;
                html += '</div>';
                return html;
            },

            selectBuildFabric(part, itemId) {
                const items = FABRIC_ITEMS[part] || [];
                const item = items.find(it => it.id === itemId);
                if (item) {
                    this.build.fabricSelections[part] = item;
                }
                this.processNextBuildItem();
            },

            skipBuildFabric() {
                // 소재 선택 없이 다음으로
                this.processNextBuildItem();
            },

            renderBuildAsk() {
                const item = this.build.currentItem;
                return `
            <div class="screen active">
                <div class="text-center py-8">
                    <div class="w-16 h-16 rounded-full bg-terra-100 flex items-center justify-center mx-auto mb-4">
                        ${partSvg(item, 28, '#A8613F')}
                    </div>
                    <h2 class="font-display text-xl font-bold text-warm-900 tracking-tight mb-2">${CATEGORY_NAMES[item]}</h2>
                    <p class="text-sm text-warm-600 mb-6">${CATEGORY_NAMES[item]}도 코디에 포함할까요?</p>
                    <div class="flex gap-2.5">
                        <button onclick="app.answerBuildOptional(true)" class="flex-1 py-3.5 bg-terra-500 text-white rounded-2xl font-semibold text-sm active:scale-[0.98] transition-all shadow-terra">네, 선택할게요</button>
                        <button onclick="app.answerBuildOptional(false)" class="flex-1 py-3.5 bg-white border border-warm-400 text-warm-700 rounded-2xl font-medium text-sm active:scale-[0.98] transition-all">건너뛰기</button>
                    </div>
                </div>
            </div>`;
            },

            answerBuildOptional(willWear) {
                if (willWear) {
                    this.build.itemQueue[0] = this.build.currentItem;
                    // 아우터/미들웨어면 옷 종류 선택 먼저
                    if (this.build.currentItem === 'outer' || this.build.currentItem === 'middleware') {
                        this.build._garmentNext = 'build-color';
                        this.currentScreen = 'build-garment';
                    } else {
                        this.currentScreen = 'build-color';
                    }
                    this.render();
                } else {
                    this.build.itemQueue.shift();
                    this.processNextBuildItem();
                }
            },

            renderBuildResult() {
                const outfit = {};
                Object.entries(this.build.colors).forEach(([k, v]) => { if (v) outfit[k] = v; });

                const personalColorType = profile.getPersonalColor();
                const evaluation = evaluationSystem.evaluate(outfit, personalColorType);
                this._lastBuildScore = evaluation.total;
                const circumference = 2 * Math.PI * 52;
                const offset = circumference * (1 - evaluation.total / 100);

                const outfitHex = {};
                Object.entries(this.build.colors).forEach(([k, v]) => {
                    if (v) outfitHex[k] = COLORS_60[v]?.hex || null;
                });

                return `
            <div class="visualizer">
                <div class="mannequin-wrap">
                    ${mannequinToImg(createMannequinSVG(outfitHex, { outerType: this.build.outerType, midType: this.build.midType }))}
                    <div class="mannequin-labels" id="mannequin-labels"></div>
                </div>
            </div>
            <div class="screen active">
                <div class="score-circle">
                    <svg viewBox="0 0 120 120">
                        <circle class="bg" cx="60" cy="60" r="52"/>
                        <circle class="fill" cx="60" cy="60" r="52" 
                            stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
                    </svg>
                    <div class="value">${evaluation.total}</div>
                    <div class="label">점</div>
                </div>

                ${evaluation.theory ? `
                <div class="flex flex-wrap justify-center gap-1.5 mb-4">
                    ${evaluation.theory.map(t => `<span class="text-[11px] font-medium px-2.5 py-1 rounded-full bg-warm-300 text-warm-700">${t}</span>`).join('')}
                </div>` : ''}

                <div class="bg-warm-200 rounded-2xl p-4 text-sm text-warm-800 leading-relaxed mb-5">${evaluation.feedback}</div>

                <div class="bg-white border border-warm-400 rounded-2xl p-4 mb-5 shadow-warm-sm">
                    ${(() => {
                        const d = 55 + (evaluation.hasPersonalColor ? 10 : 0) + (evaluation.hasBodyFit ? 5 : 0);
                        const dm = Math.max(d + 5, 60);
                        const s = 100 / dm;
                        return this.renderScoreItem('색상 다양성', evaluation.goldilocks, Math.round(20*s*10)/10) +
                            this.renderScoreItem('비율', evaluation.ratio, Math.round(10*s*10)/10) +
                            this.renderScoreItem('조화도', evaluation.harmony, Math.round(10*s*10)/10) +
                            this.renderScoreItem('계절감', evaluation.season, Math.round(10*s*10)/10) +
                            this.renderScoreItem('밸런스', evaluation.balance, Math.round(5*s*10)/10) +
                            (evaluation.hasPersonalColor ? this.renderScoreItem('퍼스널컬러', evaluation.personal, Math.round(10*s*10)/10) : '') +
                            (evaluation.hasBodyFit ? this.renderScoreItem('체형 보완', evaluation.bodyFit, Math.round(5*s*10)/10) : '');
                    })()}
                </div>

                <div class="flex flex-col gap-2.5 mb-5">
                    <button onclick="app.openSaveModal('build')" class="w-full py-3.5 bg-terra-500 text-white rounded-2xl font-semibold text-sm flex items-center justify-center gap-2 active:scale-[0.98] transition-all shadow-terra">
                        <i data-lucide="bookmark" style="width:18px;height:18px"></i> 이 코디 저장하기
                    </button>
                    <button onclick="app.shareOutfit('build')" class="w-full py-3 bg-white border border-warm-400 text-warm-800 rounded-2xl font-medium text-sm flex items-center justify-center gap-2 active:scale-[0.98] transition-all">
                        <i data-lucide="share" style="width:16px;height:16px"></i> 이 조합 공유하기
                    </button>
                    <button onclick="app.openCommunityPost('build')" class="w-full py-3 bg-warm-900 text-white rounded-2xl font-medium text-sm flex items-center justify-center gap-2 active:scale-[0.98] transition-all">
                        <i data-lucide="users" style="width:16px;height:16px"></i> 커뮤니티에 공유
                    </button>
                </div>

                ${this._renderFabricResultSection('build')}

                <div class="bg-white border border-warm-400 rounded-2xl p-4 mb-5 shadow-warm-sm">
                    <div class="flex items-center gap-1.5 text-sm font-bold text-warm-900 mb-1">
                        <i data-lucide="palette" style="width:16px;height:16px;color:#C2785C"></i> 색상 개선하기
                    </div>
                    <div class="text-xs text-warm-600 mb-3">부위를 탭하면 색상을 교체할 수 있어요</div>
                    <div class="flex gap-2 flex-wrap justify-center py-1 pb-2">
                        ${Object.entries(this.build.colors).filter(([k, v]) => v).map(([cat, colorKey]) => {
                    const c = COLORS_60[colorKey];
                    if (!c) return '';
                    const txtCol = this.chipTextColor(c.hex);
                    const border = (colorKey === 'white' || colorKey === 'ivory' || colorKey === 'cream') ? 'border:1px solid #ddd;' : '';
                    return `<div class="flex flex-col items-center gap-1 cursor-pointer flex-shrink-0" onclick="app.editBuildPart('${cat}')">
                                <div class="w-[52px] h-[52px] rounded-xl flex items-center justify-center text-[9px] font-semibold active:scale-90 transition-transform" style="background:${c.hex};${border}">
                                    <span style="color:${txtCol}">${c.name}</span>
                                </div>
                                <div class="text-[10px] text-warm-700 whitespace-nowrap">${CATEGORY_NAMES[cat]}</div>
                            </div>`;
                }).join('')}
                    </div>
                </div>

                <button onclick="app.showImprovements()" class="w-full py-3.5 bg-terra-500 text-white rounded-2xl font-semibold text-sm flex items-center justify-center gap-2 active:scale-[0.98] transition-all shadow-terra mb-2.5">비슷한 코디 추천받기</button>
                <button onclick="app.goHome()" class="w-full py-3 bg-white border border-warm-400 text-warm-700 rounded-2xl font-medium text-sm mb-12 active:scale-[0.98] transition-all">처음으로</button>
            </div>`;
            },

            renderScoreItem(label, score, max) {
                const pct = max > 0 ? Math.min(100, (score / max) * 100) : 0;
                return `
            <div class="py-2.5 border-b border-warm-300 last:border-b-0">
                <div class="flex items-center justify-between mb-1">
                    <div class="text-[11px] text-warm-600 font-medium">${label}</div>
                    <div class="font-display text-sm font-bold text-warm-900">${Math.round(score)}</div>
                </div>
                <div class="h-1 bg-warm-300 rounded-full mt-1"><div class="h-full bg-terra-500 rounded-full transition-all duration-700" style="width:${pct}%"></div></div>
            </div>`;
            },

            showImprovements() {
                this._improveCache = null;
                this._improveSeenKeys = null;
                this.goTo('build-improve');
            },

            renderBuildImprove() {
                const outfit = {};
                Object.entries(this.build.colors).forEach(([k, v]) => { if (v) outfit[k] = v; });
                const usedParts = Object.keys(outfit);
                const personalColorType = profile.getPersonalColor();
                const currentEval = evaluationSystem.evaluate(outfit, personalColorType);
                const layerType = this.detectLayerType(usedParts);

                if (!this._improveCache) {
                    this._improveCache = this._generateSimilarCombos(outfit, usedParts, layerType, personalColorType, 12);
                    this._improveSeenKeys = new Set(this._improveCache.map(c => Object.values(c.outfit).sort().join(',')));
                }

                const combos = this._improveCache;
                const ld = LAYER_DEFS[layerType];

                if (combos.length === 0) {
                    return '<div class="screen active"><div class="text-center py-12"><i data-lucide="search-x" style="width:40px;height:40px;color:#D6D3D1" class="mx-auto mb-3"></i><h2 class="font-display text-lg font-bold text-warm-900 mb-2">비슷한 코디를 찾지 못했어요</h2><p class="text-sm text-warm-600 mb-5">다른 색상 조합으로 시도해보세요</p><button onclick="app.goBack()" class="px-6 py-3 bg-terra-500 text-white rounded-2xl font-semibold text-sm active:scale-[0.98] transition-all shadow-terra">돌아가기</button></div></div>';
                }

                let html = '<div class="screen active">';
                html += '<h2 class="font-display text-xl font-bold text-warm-900 tracking-tight mb-1">이런 코디는 어때요?</h2>';
                html += '<p class="text-sm text-warm-600 mb-4">내 코디와 비슷한 컬러의 검증된 조합 ' + combos.length + '개</p>';

                html += '<div class="flex items-center gap-2.5 p-3 bg-white border border-warm-400 rounded-2xl mb-4 shadow-warm-sm">';
                html += '<span class="text-xs font-semibold text-warm-500 flex-shrink-0">내 코디</span>';
                usedParts.forEach(function (p) {
                    var c = COLORS_60[outfit[p]];
                    if (c) html += '<div class="w-5 h-5 rounded-full border border-warm-400 flex-shrink-0" style="background:' + c.hex + '" title="' + c.name + '"></div>';
                });
                html += '<span class="font-display text-xs font-bold text-warm-800 ml-auto">' + Math.round(currentEval.total) + '점</span>';
                html += '</div>';

                html += '<div class="flex flex-col gap-2.5">';
                combos.forEach(function (combo, idx) {
                    var comboOutfit = combo.outfit;
                    var outfitHex = {};
                    var partDots = '';
                    ld.partKeys.forEach(function (pk) {
                        var ck = comboOutfit[pk];
                        var c = COLORS_60[ck];
                        if (c) {
                            outfitHex[pk] = c.hex;
                            var isChanged = outfit[pk] !== ck;
                            partDots += '<div class="flex items-center gap-1.5 mb-0.5">'
                                + '<div class="w-3.5 h-3.5 rounded-full border border-warm-400 flex-shrink-0" style="background:' + c.hex + '"></div>'
                                + '<span class="text-[11px] ' + (isChanged ? 'font-semibold text-warm-900' : 'text-warm-500') + '">' + (CATEGORY_NAMES[pk] || pk) + '</span>'
                                + (isChanged ? '<span class="text-[9px] font-bold text-terra-500">NEW</span>' : '')
                                + '</div>';
                        }
                    });

                    var scoreChange = Math.round(combo._evalScore - currentEval.total);
                    var scoreLabel = scoreChange > 0 ? '+' + scoreChange : '' + scoreChange;
                    var scoreColorClass = scoreChange > 0 ? 'text-green-600' : scoreChange < 0 ? 'text-red-500' : 'text-warm-500';

                    html += '<button onclick="app.applyComboImprovement(' + idx + ')" class="w-full bg-white border border-warm-400 rounded-2xl p-4 flex gap-3 items-stretch text-left shadow-warm-sm active:scale-[0.99] transition-all hover:shadow-warm">';
                    html += '<div class="w-20 flex-shrink-0 flex items-center justify-center">' + mannequinToImg(createMannequinSVG(outfitHex, {})) + '</div>';
                    html += '<div class="flex-1 flex flex-col justify-center">';
                    html += '<div class="flex items-center gap-1.5 mb-1.5">';
                    html += '<span class="text-[13px] font-semibold text-warm-900">' + (combo.name || ('코디 ' + (idx + 1))) + '</span>';
                    html += '<span class="text-[11px] font-bold ' + scoreColorClass + ' ml-auto">' + Math.round(combo._evalScore) + '점 (' + scoreLabel + ')</span>';
                    html += '</div>';
                    html += partDots;
                    if (combo.tags && combo.tags.length) {
                        html += '<div class="mt-1"><span class="text-[10px] font-medium bg-terra-100 text-terra-700 px-1.5 py-0.5 rounded-md">' + combo.tags[0] + '</span></div>';
                    }
                    html += '</div></button>';
                });
                html += '</div>';

                html += '<div class="flex gap-2.5 mt-5">';
                html += '<button onclick="app.refreshImprove()" class="flex-1 py-3 bg-terra-500 text-white rounded-2xl font-semibold text-sm flex items-center justify-center gap-1.5 active:scale-[0.98] transition-all shadow-terra"><i data-lucide="refresh-cw" style="width:16px;height:16px"></i> 새로고침</button>';
                html += '<button onclick="app.loadMoreImprove()" class="flex-1 py-3 bg-white border border-warm-400 text-warm-700 rounded-2xl font-medium text-sm active:scale-[0.98] transition-all">+ 더 보기</button>';
                html += '</div>';
                html += '<button onclick="app._improveCache=null;app._improveAllPool=null;app.goBack()" class="w-full py-3 mt-2.5 bg-white border border-warm-400 text-warm-600 rounded-2xl text-sm font-medium active:scale-[0.98] transition-all">돌아가기</button>';
                html += '</div>';
                return html;
            },

            detectLayerType(parts) {
                const has = function (p) { return parts.indexOf(p) > -1; };
                var hasOuter = has('outer'), hasMid = has('middleware'), hasScarf = has('scarf');
                if (hasScarf && hasOuter && hasMid) return 'full';
                if (hasScarf && hasOuter) return 'scarf_basic';
                if (hasScarf && hasMid) return 'scarf_mid';
                if (hasScarf) return 'scarf_top';
                if (hasOuter && hasMid) return 'layered';
                if (hasOuter) return 'basic';
                if (hasMid) return 'mid_inner';
                return 'simple';
            },

            _generateSimilarCombos(outfit, usedParts, layerType, personalColorType, count) {
                const styles = this.build.style ? [this.build.style] : ['casual', 'preppy', 'amekaji', 'minimal', 'british'];
                const allCombos = [];
                const ld = LAYER_DEFS[layerType];
                if (!ld) return [];

                styles.forEach(function (style) {
                    if (!STYLE_MOODS[style]) return;
                    try {
                        var freeCombos = getDynamicCombos(style, layerType, 12, {});
                        freeCombos.forEach(function (c) { c._style = style; allCombos.push(c); });
                    } catch (e) { }
                    usedParts.forEach(function (part) {
                        if (!ld.partKeys.includes(part)) return;
                        var pinned = {}; pinned[part] = outfit[part];
                        try {
                            var pinCombos = getDynamicCombos(style, layerType, 6, pinned);
                            pinCombos.forEach(function (c) { c._style = style; c._pinPart = part; allCombos.push(c); });
                        } catch (e) { }
                    });
                });

                var userColors = Object.values(outfit);
                allCombos.forEach(function (combo) {
                    var comboColors = Object.values(combo.outfit);
                    var similarity = 0;
                    var shared = userColors.filter(function (c) { return comboColors.includes(c); }).length;
                    similarity += shared * 15;
                    ld.partKeys.forEach(function (part) {
                        var uc = COLORS_60[outfit[part]];
                        var cc = COLORS_60[combo.outfit[part]];
                        if (uc && cc) {
                            if (getHueDiff(uc.hcl[0], cc.hcl[0]) < 30) similarity += 8;
                            if (Math.abs(uc.hcl[2] - cc.hcl[2]) < 20) similarity += 5;
                        }
                    });
                    var exact = userColors.every(function (c) { return comboColors.includes(c); }) && comboColors.every(function (c) { return userColors.includes(c); });
                    if (exact) similarity = -100;
                    var comboEval = evaluationSystem.evaluate(combo.outfit, personalColorType);
                    combo._evalScore = comboEval.total;
                    combo._similarity = similarity;
                    combo._rank = similarity * 0.4 + comboEval.total * 0.6;
                });

                var seenKeys = this._improveSeenKeys || new Set();
                var unique = allCombos.filter(function (c) {
                    var key = Object.values(c.outfit).sort().join(',');
                    if (seenKeys.has(key) || c._similarity <= -100) return false;
                    seenKeys.add(key);
                    return true;
                });
                unique.sort(function (a, b) { return b._rank - a._rank; });
                return unique.slice(0, count);
            },

            refreshImprove() {
                this._improveCache = null;
                this._improveSeenKeys = null;
                this.render();
            },

            loadMoreImprove() {
                var outfit = {};
                var self = this;
                Object.entries(this.build.colors).forEach(function (e) { if (e[1]) outfit[e[0]] = e[1]; });
                var usedParts = Object.keys(outfit);
                var layerType = this.detectLayerType(usedParts);
                var personalColorType = profile.getPersonalColor();

                var moreCombos = this._generateSimilarCombos(outfit, usedParts, layerType, personalColorType, 8);
                if (moreCombos.length === 0) {
                    // 못 찾으면 seen 리셋하고 재시도
                    this._improveSeenKeys = new Set(this._improveCache.map(function (c) { return Object.values(c.outfit).sort().join(','); }));
                    moreCombos = this._generateSimilarCombos(outfit, usedParts, layerType, personalColorType, 8);
                }
                if (moreCombos.length > 0) {
                    this._improveCache = this._improveCache.concat(moreCombos);
                }
                this.render();
            },

            applyComboImprovement(idx) {
                if (!this._improveCache || !this._improveCache[idx]) return;
                var combo = this._improveCache[idx];
                Object.entries(combo.outfit).forEach(([k, v]) => {
                    this.build.colors[k] = v;
                });
                this._improveCache = null;
                this._improveSeenKeys = null;
                this.currentScreen = 'build-result';
                this.render();

            generateRecommendations() {
                const { mood, style, layerType, pinned } = this.recommend;
                let results = [];

                if (style) {
                    // 특정 스타일
                    const outfits = generateOutfitsWithPins(style, 20, layerType, pinned);
                    results = outfitsToComboFormat(outfits, style, layerType);
                } else if (mood) {
                    // 무드 그룹 전체
                    const styles = MOOD_GROUPS[mood]?.styles || [];
                    styles.forEach(s => {
                        const outfits = generateOutfitsWithPins(s, 6, layerType, pinned);
                        results.push(...outfitsToComboFormat(outfits, s, layerType));
                    });
                    results.sort((a, b) => b.score - a.score);
                } else {
                    // 전체 스타일
                    Object.keys(STYLE_MOODS).forEach(s => {
                        const outfits = generateOutfitsWithPins(s, 3, layerType, pinned);
                        results.push(...outfitsToComboFormat(outfits, s, layerType));
                    });
                    results.sort((a, b) => b.score - a.score);
                }

                // 맞춤 적용 (fitMode ON일 때만)
                const fitMode = profile.getFitMode();
                const pc = profile.getPersonalColor();
                const bt = profile.getBodyType();

                if (fitMode && (pc || bt)) {
                    results.forEach(r => {
                        let bonus = 0;
                        // 퍼스널컬러 보너스
                        if (pc) {
                            const pcData = PERSONAL_COLOR_12[pc];
                            if (pcData) {
                                FACE_NEAR_ITEMS.forEach(item => {
                                    if (r.outfit[item]) {
                                        if ((pcData.bestColors || []).includes(r.outfit[item])) bonus += 5;
                                        if ((pcData.avoidColors || []).includes(r.outfit[item])) bonus -= 10;
                                    }
                                });
                            }
                        }
                        // 체형 보완 보너스
                        if (bt) {
                            const btData = BODY_GUIDE_DATA[bt];
                            if (btData?.colorRules) {
                                const rules = btData.colorRules;
                                Object.entries(r.outfit).forEach(([part, colorKey]) => {
                                    if (!colorKey) return;
                                    const rule = rules[part];
                                    if (!rule || rule === 'any') return;
                                    const c = COLORS_60[colorKey];
                                    if (!c) return;
                                    const L = c.hcl[2];
                                    if (rule === 'light' && L >= 55) bonus += 3;
                                    else if (rule === 'dark' && L <= 45) bonus += 3;
                                    else if (rule === 'light' && L < 35) bonus -= 5;
                                    else if (rule === 'dark' && L > 70) bonus -= 5;
                                });
                            }
                        }
                        r.score += bonus;
                    });
                    results.sort((a, b) => b.score - a.score);
                }

                this.recommend.results = results.slice(0, 30);
            },

            renderRecPin() {

                    { label: '파스텔', keys: ['pastel_pink', 'pastel_blue', 'pastel_green', 'pastel_yellow', 'pastel_purple', 'pastel_mint', 'pastel_peach', 'pastel_lavender'] },
                    { label: '비비드', keys: ['red', 'blue', 'green', 'yellow', 'orange', 'purple', 'pink', 'teal', 'coral', 'turquoise', 'royal_blue', 'emerald'] },
                    { label: '다크', keys: ['dark_red', 'dark_blue', 'dark_green', 'dark_purple', 'dark_brown', 'wine', 'forest', 'midnight', 'chocolate', 'slate', 'maroon', 'indigo'] }

            // ============================================================

            renderPCSelect() {

                    { key: 'winter', name: '겨울 (Winter)', emoji: '❄️', types: ['winter_bright', 'winter_deep', 'winter_true'] }
                ];

                return `
            <div class="screen active">
                <h2 class="font-display text-xl font-bold text-warm-900 tracking-tight mb-2">퍼스널컬러</h2>
                <p class="text-sm text-warm-600 mb-5">나에게 어울리는 컬러톤을 설정하면 코디 추천에 반영됩니다.</p>

                <div class="grid grid-cols-2 gap-2.5 mb-5">

                    </button>
                    <button onclick="app.startPCQuiz()" class="bg-white border border-warm-400 rounded-2xl p-4 text-center shadow-warm-sm active:scale-[0.97] transition-all hover:shadow-warm">

                        <div class="text-sm font-semibold text-warm-900">문답 진단</div>
                        <div class="text-[11px] text-warm-600 mt-1 leading-snug">8개 질문에 답하여 진단 · 약 1분</div>
                    </button>

                <div class="text-xs font-semibold text-warm-600 tracking-widest uppercase mb-3">또는 직접 선택</div>

                    <div class="pc-season-group" id="pc-group-${season.key}">

                            <span class="season-name">${season.name}</span>
                            <span class="season-arrow">▼</span>
                        </div>
                        <div class="pc-season-types">
                            ${season.types.map(type => {
                    const data = PERSONAL_COLOR_12[type];
                    if (!data) return '';
                    return `
                                    <div class="pc-type-card ${current === type ? 'selected' : ''}" onclick="app.selectPC('${type}')">
                                        <div class="pt-name">${data.emoji} ${data.name}</div>
                                        <div class="pt-desc">${data.description}</div>
                                        <div class="pt-colors">
                                            ${(data.bestColors || []).slice(0, 6).map(c => {

                    }).join('')}
                                        </div>
                                    </div>`;
                }).join('')}

                `).join('')}

                ${current ? `

            },

            toggleSeasonGroup(seasonKey) {
                const group = document.getElementById(`pc-group-${seasonKey}`);

                document.querySelectorAll('.pc-season-group').forEach(g => {
                    if (g.id !== `pc-group-${seasonKey}`) g.classList.remove('expanded');

                group.classList.toggle('expanded');
            },

            selectPC(type) {
                this._pcPreview = type;
                this.goTo('pc-result');

            startPCQuiz() {
                this.diagnosis = {
                    type: 'personal', step: 0,
                    scores: { warm: 0, cool: 0, spring: 0, summer: 0, autumn: 0, winter: 0, light: 0, bright: 0, true: 0, muted: 0, soft: 0, deep: 0 }
                };
                this.goTo('pc-quiz');
            },

            renderPCQuiz() {
                const questions = PERSONAL_COLOR_DIAGNOSIS.questions;
                const q = questions[this.diagnosis.step];
                const progress = ((this.diagnosis.step + 1) / questions.length) * 100;
                document.getElementById('progressBar').style.width = progress + '%';

                return `
            <div class="screen active">
                <div class="text-xs text-warm-500 font-display font-semibold mb-4">${this.diagnosis.step + 1} / ${questions.length}</div>
                <h2 class="font-display text-lg font-bold text-warm-900 tracking-tight mb-5 leading-snug">${q.question}</h2>
                <div class="flex flex-col gap-2.5">
                ${q.options.map((opt, idx) => `
                    <button onclick="app.answerPCQuiz(${idx})" class="w-full bg-white border border-warm-400 rounded-2xl p-4 text-left text-sm text-warm-800 shadow-warm-sm active:scale-[0.98] transition-all hover:border-terra-300 hover:shadow-warm">
                        ${opt.text}
                    </button>
                `).join('')}
                </div>
            </div>`;
            },

            answerPCQuiz(optIdx) {
                const questions = PERSONAL_COLOR_DIAGNOSIS.questions;
                const q = questions[this.diagnosis.step];
                const opt = q.options[optIdx];

                Object.entries(opt.score).forEach(([key, val]) => {
                    this.diagnosis.scores[key] = (this.diagnosis.scores[key] || 0) + val;
                });

                if (this.diagnosis.step < questions.length - 1) {
                    this.diagnosis.step++;
                    this.render();
                } else {
                    // 결과 계산
                    const s = this.diagnosis.scores;
                    const isWarm = (s.warm || 0) > (s.cool || 0);
                    let season = isWarm
                        ? ((s.spring || 0) > (s.autumn || 0) ? 'spring' : 'autumn')
                        : ((s.summer || 0) > (s.winter || 0) ? 'summer' : 'winter');

                    const lightS = s.light || 0, brightS = s.bright || 0, trueS = s.true || 0, mutedS = s.muted || 0, softS = s.soft || 0, deepS = s.deep || 0;
                    let subType;
                    if (season === 'spring') subType = lightS >= brightS && lightS >= trueS ? 'light' : brightS >= trueS ? 'bright' : 'true';
                    else if (season === 'summer') subType = lightS >= mutedS && lightS >= trueS ? 'light' : mutedS >= trueS ? 'muted' : 'true';
                    else if (season === 'autumn') subType = softS >= deepS && softS >= trueS ? 'soft' : deepS >= trueS ? 'deep' : 'true';

                    const resultType = `${season}_${subType}`;

            startPCLight() {

            pclGetSteps() {
                const p = this.pcLight;

                if (p.phase === 'value') return p.undertoneResult === 'warm' ? PC_LIGHT_STEPS.warm_value : PC_LIGHT_STEPS.cool_value;

                    </div>
                    <div style="display:flex;align-items:flex-start;gap:12px">
                        <span style="font-size:22px;flex-shrink:0">👀</span>
                        <div><div style="font-size:14px;font-weight:600">피부가 깨끗해 보이는 쪽 선택!</div>
                        <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px">양쪽 빛을 비교해서 골라주세요</div></div>
                    </div>

                <div style="font-size:13px;font-weight:600;margin-bottom:8px">화면 구성</div>

                    <div class="pcl-prev-half" style="background:#F8A0C0"><span>B</span></div>
                </div>
                <div style="font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:20px">같은 색 계열, 톤만 달라요</div>

                <div class="pcl-tip" style="margin-bottom:16px;text-align:left">
                    <div style="font-weight:600;margin-bottom:4px">💡 이것만 기억하세요</div>
                    <span style="color:#6ee7b7">✅ 맞는 톤:</span> 피부가 깨끗하고 고르게 보임<br>
                    <span style="color:#fca5a5">❌ 안 맞는 톤:</span> 피부가 칙칙하거나 거칠어 보임
                </div>

                <div class="pcl-tip" style="margin-bottom:24px;text-align:left">
                    <div style="font-weight:600;margin-bottom:4px">📱 시작 전 확인</div>
                    야간모드 / 블루라이트 차단을 끄세요<br>
                    화면 밝기를 최대로 올려주세요<br>

            },

            renderPCLightStep() {
                const p = this.pcLight;
                const steps = this.pclGetSteps();
                const step = steps[p.stepIndex];
                const progress = (step.stepNum / 7) * 100;
                const canGoBack = p.navHistory.length > 0;
                const isUndertone = p.phase === 'undertone';

                return `
            <div class="pcl-step-screen">
                ${canGoBack ? '<button class="pcl-btn-back" onclick="app.pclGoBack()">← 이전 단계</button>' : ''}
                <div class="pcl-top-row">
                    <div class="pcl-progress"><div class="pcl-progress-bar" style="width:${progress}%"></div></div>
                </div>
                <div class="pcl-phase">${step.phase}</div>
                <div class="pcl-title">STEP ${step.stepNum} / 7</div>
                <div class="pcl-preview">
                    <div class="pcl-prev-half" style="background:${step.leftColor}"><span>A</span></div>
                    <div class="pcl-prev-sep"></div>
                    <div class="pcl-prev-half" style="background:${step.rightColor}"><span>B</span></div>
                </div>
                <p class="pcl-instruction">${step.instruction}</p>
                <div class="pcl-tip">${step.tip}</div>
                <div class="pcl-descs"><span>${step.leftDesc}</span><span>vs</span><span>${step.rightDesc}</span></div>
                ${isUndertone ? '<div class="pcl-similar-note">구별이 어려우면 "비슷해요"를 눌러도 됩니다</div>' : ''}
                <button class="pcl-btn-start" onclick="app.pclBeginProjection()">빛 비추기 시작 →</button>
            </div>`;
            },

            pclBeginProjection() {
                const steps = this.pclGetSteps();
                const step = steps[this.pcLight.stepIndex];

                document.getElementById('pcl-proj-left').style.background = step.leftColor;
                document.getElementById('pcl-proj-right').style.background = step.rightColor;
                document.getElementById('pcl-btn-left').textContent = 'A 선택';
                document.getElementById('pcl-btn-right').textContent = 'B 선택';
                document.getElementById('pcl-btn-similar').style.display = this.pcLight.phase === 'undertone' ? 'block' : 'none';

                document.getElementById('pc-light-overlay').classList.add('active');
            },

            pclSelectSide(side) {
                document.getElementById('pc-light-overlay').classList.remove('active');
                const steps = this.pclGetSteps();
                const step = steps[this.pcLight.stepIndex];
                this.pclAnswer(side === 'left' ? step.leftValue : step.rightValue);
            },

            pclSelectSimilar() {
                document.getElementById('pc-light-overlay').classList.remove('active');
                this.pclAnswer('similar');
            },

            pclBackFromProj() {
                document.getElementById('pc-light-overlay').classList.remove('active');
            },

            pclGoBack() {
                const p = this.pcLight;
                if (!p.navHistory.length) return;
                const prev = p.navHistory.pop();
                if (prev.phase === 'undertone') p.undertoneAnswers.pop();
                else if (prev.phase === 'value') p.valueAnswers.pop();
                else if (prev.phase === 'chroma') p.chromaAnswers.pop();
                if (prev.phase !== p.phase) {
                    p.phase = prev.phase;
                    if (prev.phase === 'undertone') p.undertoneResult = null;
                    else if (prev.phase === 'value') p.valueResult = null;
                }
                p.stepIndex = prev.stepIndex;
                this.render();
            },

            pclAnswer(value) {
                const p = this.pcLight;
                p.navHistory.push({ phase: p.phase, stepIndex: p.stepIndex });
                if (p.phase === 'undertone') p.undertoneAnswers.push(value);
                else if (p.phase === 'value') p.valueAnswers.push(value);
                else if (p.phase === 'chroma') p.chromaAnswers.push(value);

                const steps = this.pclGetSteps();
                if (p.stepIndex < steps.length - 1) {
                    p.stepIndex++;
                    this.render();
                } else {
                    this.pclFinishPhase();
                }
            },

            pclCountIn(arr, val) { var c = 0; for (var i = 0; i < arr.length; i++) if (arr[i] === val) c++; return c; },

            pclFinishPhase() {
                const p = this.pcLight;
                if (p.phase === 'undertone') {
                    const wc = this.pclCountIn(p.undertoneAnswers, 'warm');
                    const cc = this.pclCountIn(p.undertoneAnswers, 'cool');
                    const sc = this.pclCountIn(p.undertoneAnswers, 'similar');
                    if (sc >= 2 || (wc === 1 && cc === 1 && sc === 1)) {
                        // 뉴트럴 → spring_true 로 매핑 (가장 범용적)
                        this._pcPreview = 'spring_true';
                        this.goTo('pc-result');
                        return;
                    }
                    p.undertoneResult = wc > cc ? 'warm' : 'cool';
                    p.phase = 'value'; p.stepIndex = 0; this.render();
                } else if (p.phase === 'value') {
                    const lc = this.pclCountIn(p.valueAnswers, 'light');
                    const dc = this.pclCountIn(p.valueAnswers, 'deep');
                    p.valueResult = lc > dc ? 'light' : (dc > lc ? 'deep' : p.valueAnswers[0]);
                    p.phase = 'chroma'; p.stepIndex = 0; this.render();
                } else if (p.phase === 'chroma') {
                    const clc = this.pclCountIn(p.chromaAnswers, 'clear');
                    const mc = this.pclCountIn(p.chromaAnswers, 'muted');
                    p.chromaResult = clc > mc ? 'clear' : (mc > clc ? 'muted' : p.chromaAnswers[0]);

                    // 결과 매핑
                    const mapKey = p.undertoneResult + '_' + p.valueResult + '_' + p.chromaResult;
                    const resultType = PC_LIGHT_RESULT_MAP[mapKey] || 'spring_true';
                    this._pcPreview = resultType;
                    this.goTo('pc-result');
                }
            },

            // ============================================================
            // 마네킹 라벨 업데이트
            // ============================================================
            updateLabels() {
                const container = document.getElementById('mannequin-labels');
                if (!container) return;

                const labelPositions = {
                    hat: { x: 80, y: 25, side: 'left' },
                    scarf: { x: 220, y: 130, side: 'right' },
                    outer: { x: 60, y: 220, side: 'left' },
                    top: { x: 240, y: 180, side: 'right' },
                    middleware: { x: 230, y: 260, side: 'right' },
                    bottom: { x: 70, y: 350, side: 'left' },
                    shoes: { x: 230, y: 480, side: 'right' }
                };

                let html = '';
                Object.entries(this.build.colors).forEach(([cat, colorKey]) => {
                    const pos = labelPositions[cat];
                    if (!pos) return;
                    const isSelecting = cat === this.build.currentItem && !colorKey;
                    const isFilled = colorKey != null;
                    if (!isSelecting && !isFilled) return;

                    let statusClass = '', statusText = '';
                    if (isSelecting) {
                        statusClass = 'selecting';
                        statusText = `${CATEGORY_NAMES[cat]} - 선택 중 ⚡`;
                    } else if (isFilled) {
                        statusClass = 'filled';
                        const color = COLORS_60[colorKey];
                        statusText = `${CATEGORY_NAMES[cat]} - ${color?.name || ''}`;
                    }

                    const leftPct = (pos.x / 300) * 100;
                    const topPct = (pos.y / 500) * 100;
                    const xStyle = pos.side === 'left' ? `right:${100 - leftPct}%` : `left:${leftPct}%`;

                    html += `<div class="label-item ${statusClass} ${pos.side}" style="top:${topPct}%;${xStyle}">
                ${pos.side === 'left' ? `<div class="label-content">${statusText}</div><span class="label-arrow">→</span>` :
                            `<span class="label-arrow">←</span><div class="label-content">${statusText}</div>`}
            </div>`;
                });
                container.innerHTML = html;
            },

            // ============================================================
            // ── 소재 궁합 결과 섹션 (빌드/추천 결과에 인라인) ──
            // ============================================================
            _renderFabricResultSection(source) {
                const fabSel = this.build.fabricSelections || {};
                const hasFabrics = Object.values(fabSel).some(v => v);

                if (hasFabrics) {
                    // 소재를 선택한 경우: 인라인 궁합 표시
                    const pairs = evaluateFabricCombo(fabSel);
                    const season = this._getCurrentSeason();

                    let greatCount = 0, okCount = 0, badCount = 0;
                    for (const p of pairs) {
                        if (p.rating === 'great') greatCount++;
                        else if (p.rating === 'ok') okCount++;
                        else badCount++;
                    }

                    let grade = 'A+', gradeColor = '#34c759';
                    if (badCount >= 2) { grade = 'D'; gradeColor = '#ff3b30'; }
                    else if (badCount === 1) { grade = 'C'; gradeColor = '#ff9500'; }
                    else if (okCount >= 2) { grade = 'B'; gradeColor = '#ffcc00'; }
                    else if (okCount === 1) { grade = 'A'; gradeColor = '#34c759'; }

                    let html = `<div class="improve-card" style="margin-top:16px">
                        <div class="improve-card-title">🧵 소재 궁합</div>
                        <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
                            <span style="font-size:28px;font-weight:800;color:${gradeColor}">${grade}</span>
                            <div style="font-size:12px;color:var(--text-sub)">
                                ${FABRIC_SEASONS[season]?.emoji || ''} ${FABRIC_SEASONS[season]?.name || ''} 기준
                            </div>
                        </div>`;

                    // 선택한 소재 태그
                    html += '<div class="flex flex-wrap gap-1.5 mb-2">';
                    for (const [part, item] of Object.entries(fabSel)) {
                        if (!item) continue;
                        html += `<span class="inline-flex items-center gap-1 px-2.5 py-1.5 rounded-full text-xs font-semibold bg-terra-50 text-terra-600">${partSvg(part, 12, "#A8613F")} ${item.name}</span>`;
                    }
                    html += '</div>';

                    // 궁합 쌍 (bad/ok만 표시, great는 생략하여 깔끔하게)
                    const issues = pairs.filter(p => p.rating !== 'great');

                        html += `<div style="font-size:12px;color:#34c759;font-weight:600">✅ 모든 소재가 잘 어울려요!</div>`;

                    html += '</div>';

                return `<div style="margin-top:12px">

                const season = f.season;

                // 이전에 선택한 아이템들
                const prevSelections = Object.entries(f.selections)
                    .filter(([k, v]) => v && k !== part)
                    .map(([k, v]) => ({ part: k, item: v }));

                let html = `<div class="screen active p-4">
                    <div class="text-center py-2 pb-4">
                        <div class="flex justify-center mb-1">${partSvg(part, 28, "#C2785C")}</div>
                        <h2 class="font-display text-lg font-bold text-warm-900 mb-1">${CATEGORY_NAMES[part]} 소재 선택</h2>
                        <p class="text-xs text-warm-600">${FABRIC_SEASONS[season]?.emoji || ''} ${FABRIC_SEASONS[season]?.name || ''} 기준</p>
                    </div>`;

                // 이전 선택 요약
                if (prevSelections.length > 0) {
                    html += '<div class="flex flex-wrap gap-1.5 mb-3">';
                    for (const ps of prevSelections) {
                        html += `<span class="inline-flex items-center gap-1 px-2.5 py-1.5 rounded-full text-xs font-semibold bg-terra-50 text-terra-600">${partSvg(ps.part, 12, "#A8613F")} ${ps.item.name}</span>`;
                    }
                    html += '</div>';
                }

                html += '<div class="flex flex-col gap-2">';

                for (const item of items) {
                    // 계절 적합성 확인
                    const seasonMatch = item.seasons.includes(season);
                    let seasonWarnHtml = '';
                    if (!seasonMatch) {
                        seasonWarnHtml = `<div class="text-[10px] text-yellow-600 mt-0.5">⚠️ ${FABRIC_SEASONS[season]?.name}에 맞지 않는 소재</div>`;
                    }

                    // 이전 선택과 궁합 계산
                    let compatHtml = '';
                    if (prevSelections.length > 0) {
                        let worstRating = 'great';
                        let reasons = [];
                        for (const ps of prevSelections) {
                            const compat = getFabricCompat(item, ps.item);
                            if (compat) {
                                if (compat.rating === 'bad') worstRating = 'bad';
                                else if (compat.rating === 'ok' && worstRating !== 'bad') worstRating = 'ok';
                                reasons.push(compat.reason);
                            }
                        }
                        const labels = { great: '✅ 추천', ok: '⚠️ 주의', bad: '❌ 비추' };
                        const compatColors = { great: 'bg-green-500/10 text-green-600', ok: 'bg-yellow-500/10 text-yellow-700', bad: 'bg-red-500/10 text-red-600' };
                        compatHtml = `<span class="flex-shrink-0 text-[11px] font-bold px-2 py-1 rounded-lg text-center ${compatColors[worstRating]}">${labels[worstRating]}</span>`;
                    }

                    html += `<div class="flex items-center gap-3 px-4 py-3.5 rounded-[14px] border-[1.5px] border-warm-400 bg-white cursor-pointer active:scale-[0.98] transition-all" onclick="app.selectFabricItem('${part}','${item.id}')" ${!seasonMatch ? 'style="opacity:0.55"' : ''}>

                        <div class="flex-1 min-w-0">

                html += '</div></div>';

            selectFabricItem(part, itemId) {
                const items = FABRIC_ITEMS[part] || [];
                const item = items.find(it => it.id === itemId);
                if (!item) return;

                this.fabric.selections[part] = item;
                if (!this.fabric.partOrder.includes(part)) {
                    this.fabric.partOrder.push(part);
                }

                // 뒤로 가서 메인 화면으로
                this.screenHistory.push(this.currentScreen);
                this.currentScreen = 'fabric';
                this.render();

            renderFabricSummary() {
                const f = this.fabric;
                const pairs = evaluateFabricCombo(f.selections);
                const season = f.season;

                // 전체 등급 계산
                let greatCount = 0, okCount = 0, badCount = 0;
                for (const p of pairs) {
                    if (p.rating === 'great') greatCount++;

                    else badCount++;

                let grade = 'A+';
                let gradeColor = '#34c759';
                if (badCount >= 2) { grade = 'D'; gradeColor = '#ff3b30'; }

                else if (okCount >= 2) { grade = 'B'; gradeColor = '#ffcc00'; }
                else if (okCount === 1) { grade = 'A'; gradeColor = '#34c759'; }

                // 계절 경고
                let seasonWarns = [];
                for (const [part, item] of Object.entries(f.selections)) {
                    if (item && season && !item.seasons.includes(season)) {
                        seasonWarns.push(`${CATEGORY_NAMES[part]}: ${item.name}은 ${FABRIC_SEASONS[season]?.name}에 맞지 않아요`);

                let html = `<div class="screen active p-4">`;

                // 선택한 아이템 요약

                for (const pk of f.partOrder) {

                    html += '<div class="p-3.5 rounded-[14px] mb-4 bg-red-500/[0.06] border border-red-500/[0.15]"><div class="text-[13px] font-bold text-red-600 mb-1.5">⚠️ 주의할 점</div>';

                html += '<div class="text-sm font-bold mt-5 mb-2.5 flex items-center gap-1.5">🔍 소재 궁합 상세</div>';
                for (const p of pairs) {

                    const badgeText = p.rating === 'great' ? '추천' : p.rating === 'ok' ? '주의' : '비추';

                    html += `<div class="flex items-center gap-2 py-2 border-b border-warm-400 last:border-b-0 text-[13px]">
                        <span class="text-xs font-semibold min-w-[80px]">
                            ${partSvg(p.partA, 14, "#A8613F")} ${CATEGORY_NAMES[p.partA]} × ${partSvg(p.partB, 14, "#A8613F")} ${CATEGORY_NAMES[p.partB]}

                        <span class="flex-shrink-0 text-[11px] font-bold px-2 py-1 rounded-lg ${compatColors[badgeClass]}">${badgeText}</span>
                        <span class="text-xs text-warm-700 flex-1">${p.reason}</span>
                    </div>`;
                }

                // 다시 하기 버튼
                html += `<div class="flex gap-2 mt-6">
                    <button class="flex-1 py-3.5 bg-white border-[1.5px] border-warm-400 text-warm-900 rounded-[14px] font-bold text-[15px] active:scale-[0.98] transition-all"
                        onclick="app.goTo('fabric')">수정하기</button>

                        onclick="app.startFabricGuide()">처음부터</button>
                </div>`;

                html += '</div>';
                return html;
            },

            _getWeatherLayer(temp) {
                for (var i = 0; i < this._weatherLayers.length; i++) {
                    var l = this._weatherLayers[i];
                    if (temp >= l.min && temp <= l.max) return l;
                }
                return this._weatherLayers[this._weatherLayers.length - 1];
            },

            fetchWeather() {
                var self = this;
                this._weatherError = null;
                this._fetchWeatherCore(function() { self.render(); });
            },

            fetchWeatherForHome() {
                var self = this;
                this._fetchWeatherCore(function() {
                    // 홈 화면에 있을 때만 칩 업데이트
                    if (self.currentScreen === 'home') {
                        var chip = document.querySelector('.home-weather-chip');
                        if (chip && self._weatherData) {
                            var w = self._weatherData;
                            var icon = self._weatherCodeEmoji(w.code);
                            chip.innerHTML = '<span>' + icon + '</span> ' + (w.location || '현재 위치') + ' ' + w.temp + '°C';
                        }
                    }
                });
            },

            _fetchWeatherCore(callback) {
                var self = this;

                if (!navigator.geolocation) {
                    this._weatherError = '위치 정보를 사용할 수 없어요.';
                    if (callback) callback();
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    function (pos) {
                        var lat = pos.coords.latitude.toFixed(2);
                        var lon = pos.coords.longitude.toFixed(2);
                        var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon +
                            '&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m' +
                            '&hourly=temperature_2m,weather_code&timezone=auto&forecast_days=1';

                        fetch(url).then(function (r) { return r.json(); }).then(function (data) {
                            if (!data.current) throw new Error('No data');
                            self._weatherData = {
                                temp: Math.round(data.current.temperature_2m),
                                feels: Math.round(data.current.apparent_temperature),
                                humidity: data.current.relative_humidity_2m,
                                wind: Math.round(data.current.wind_speed_10m),
                                code: data.current.weather_code,
                                hourly: data.hourly ? data.hourly.temperature_2m.slice(0, 24).map(function (t, i) {
                                    return { hour: i, temp: Math.round(t), code: data.hourly.weather_code[i] };
                                }) : [],
                                lat: lat, lon: lon
                            };
                            self._weatherData.location = '현재 위치';
                            fetch('https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&current=temperature_2m&timezone=auto')
                                .then(function (r) { return r.json(); })
                                .then(function (d) {
                                    if (d.timezone) self._weatherData.location = d.timezone.split('/').pop().replace(/_/g, ' ');
                                    if (callback) callback();
                                }).catch(function () { if (callback) callback(); });
                        }).catch(function () {
                            self._weatherError = '날씨 정보를 불러올 수 없어요.';
                            if (callback) callback();
                        });
                    },
                    function () {
                        self._weatherError = '위치 접근이 거부되었어요.\n브라우저 설정에서 위치 권한을 허용해주세요.';
                        if (callback) callback();
                    },
                    { timeout: 10000 }
                );
            },

            _weatherCodeEmoji(code) {
                if (code <= 1) return '☀️'; if (code <= 3) return '⛅'; if (code <= 48) return '🌫️';
                if (code <= 57) return '🌧️'; if (code <= 67) return '🌧️'; if (code <= 77) return '🌨️';
                if (code <= 82) return '🌧️'; if (code <= 86) return '🌨️'; return '⛈️';
            },
            _weatherCodeText(code) {
                if (code === 0) return '맑음'; if (code <= 3) return '구름 조금'; if (code <= 48) return '흐림/안개';
                if (code <= 57) return '이슬비'; if (code <= 67) return '비'; if (code <= 77) return '눈';
                if (code <= 82) return '소나기'; if (code <= 86) return '눈'; return '뇌우';
            },

            renderWeather() {
                var w = this._weatherData;
                var err = this._weatherError;

                if (err) {
                    return '<div class="screen active"><div class="weather-loading">' +
                        '<div style="font-size:48px;margin-bottom:16px">📍</div>' +
                        '<div style="font-size:14px;line-height:1.6;white-space:pre-line">' + err + '</div>' +
                        '<button class="w-full mt-5 py-3.5 bg-terra-500 text-white rounded-2xl font-semibold text-sm shadow-terra active:scale-[0.98] transition-all" onclick="app._weatherError=null;app.fetchWeather();app.render()">다시 시도</button>' +
                        '</div></div>';
                }

                if (!w) {
                    return '<div class="screen active"><div class="weather-loading">' +
                        '<div style="font-size:48px;margin-bottom:16px">🌤️</div>' +
                        '<div>날씨 정보를 가져오고 있어요...</div>' +
                        '</div></div>';
                }

                var layer = this._getWeatherLayer(w.feels);
                var isRain = w.code >= 51 && w.code <= 82;
                var isSnow = w.code >= 71 && w.code <= 86;
                var self = this;
                var now = new Date().getHours();

                var h = '<div class="screen active">';

                // Hero
                h += '<div class="weather-hero">';
                h += '<div style="font-size:40px">' + this._weatherCodeEmoji(w.code) + '</div>';
                h += '<div class="weather-temp">' + w.temp + '°</div>';
                h += '<div class="weather-desc">' + this._weatherCodeText(w.code) + '</div>';
                h += '<div class="weather-detail">';
                h += '<span>체감 ' + w.feels + '°</span>';
                h += '<span>습도 ' + w.humidity + '%</span>';
                h += '<span>바람 ' + w.wind + 'km/h</span>';
                h += '</div>';
                h += '<div class="weather-loc">📍 ' + w.location + '</div>';
                h += '</div>';

                // 시간별 기온
                if (w.hourly.length > 0) {
                    h += '<div class="weather-hourly">';
                    w.hourly.forEach(function (hr) {
                        var cls = hr.hour === now ? ' now' : '';
                        h += '<div class="weather-hour' + cls + '">';
                        h += '<div>' + (hr.hour === now ? '지금' : hr.hour + '시') + '</div>';
                        h += '<div style="font-size:14px">' + self._weatherCodeEmoji(hr.code) + '</div>';
                        h += '<div class="weather-hour-temp">' + hr.temp + '°</div>';
                        h += '</div>';
                    });
                    h += '</div>';
                }

                // 날씨 특이사항 팁
                if (isRain) {

            renderQuiz() {
                var q = this._quiz;
                var step = q.step;
                var data = this._quizData;

                if (step >= data.length) {
                    this.goTo('quiz-result');
                    return '';
                }

                var cur = data[step];
                var self = this;

                var h = '<div class="screen active">';

                // progress
                h += '<div class="quiz-progress">';
                for (var i = 0; i < data.length; i++) {
                    var cls = i < step ? 'done' : (i === step ? 'current' : '');
                    h += '<div class="quiz-progress-dot ' + cls + '"></div>';
                }
                h += '</div>';

                // question
                h += '<div class="quiz-q">' + cur.q.replace(/\n/g, '<br>') + '</div>';
                h += '<div class="quiz-sub">' + cur.sub + '</div>';

                // options
                h += '<div class="quiz-options">';
                cur.opts.forEach(function (opt, idx) {
                    h += '<div class="quiz-opt" onclick="app.quizAnswer(' + idx + ')">';
                    h += '<div class="quiz-opt-icon">' + opt.icon + '</div>';
                    h += '<div>';
                    h += '<div class="quiz-opt-text">' + opt.text + '</div>';
                    h += '<div class="quiz-opt-desc">' + opt.desc + '</div>';
                    h += '</div>';
                    h += '</div>';
                });
                h += '</div>';

                // step indicator
                h += '<div style="text-align:center;margin-top:16px;font-size:12px;color:var(--text-sub)">' + (step + 1) + ' / ' + data.length + '</div>';
                h += '</div>';

            quizAnswer(optIdx) {
                this._quiz.answers.push(optIdx);
                this._quiz.step++;
                if (this._quiz.step >= this._quizData.length) {
                    this.goTo('quiz-result');
                } else {
                    this.render();
                }
            },

            _quizCalcResults() {
                var scores = {};
                var data = this._quizData;
                var answers = this._quiz.answers;

                answers.forEach(function (optIdx, qIdx) {
                    if (!data[qIdx] || !data[qIdx].opts[optIdx]) return;
                    var s = data[qIdx].opts[optIdx].scores;
                    Object.entries(s).forEach(function (e) {
                        scores[e[0]] = (scores[e[0]] || 0) + e[1];
                    });
                });

                var sorted = Object.entries(scores).sort(function (a, b) { return b[1] - a[1]; });
                var maxScore = sorted[0] ? sorted[0][1] : 1;
                return sorted.slice(0, 5).map(function (e) {
                    return { key: e[0], score: e[1], pct: Math.round(e[1] / maxScore * 100) };
                });
            },

            closetPhotoSelected(event) {
                var file = event.target.files?.[0];
                if (!file) return;
                var self = this;
                var reader = new FileReader();
                reader.onload = function (e) {
                    var imgSrc = e.target.result;
                    // 썸네일 생성 + 색상 추출
                    var img = new Image();
                    img.onload = function () {
                        // 썸네일
                        var tc = document.createElement('canvas');
                        tc.width = 150; tc.height = 150;
                        var tctx = tc.getContext('2d');
                        var s = Math.min(img.width, img.height);
                        var sx = (img.width - s) / 2, sy = (img.height - s) / 2;
                        tctx.drawImage(img, sx, sy, s, s, 0, 0, 150, 150);
                        self._closetState.photoThumb = tc.toDataURL('image/jpeg', 0.6);
                        self._closetState.photoData = imgSrc;
                        self.closetExtractColorsFromImg(img);
                    };
                    img.src = imgSrc;
                };
                reader.readAsDataURL(file);
            },

            closetExtractColorsFromImg(img) {
                var self = this;
                var canvas = document.createElement('canvas');
                var size = 100;
                canvas.width = size;
                canvas.height = size;
                var ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, size, size);
                var data = ctx.getImageData(0, 0, size, size).data;

                // 중앙 영역 위주 샘플링
                var pixels = [];
                for (var y = 15; y < 85; y += 2) {
                    for (var x = 15; x < 85; x += 2) {
                        var i = (y * size + x) * 4;
                        var r = data[i], g = data[i + 1], b = data[i + 2];
                        var brightness = (r + g + b) / 3;
                        if (brightness > 20 && brightness < 245) {
                            pixels.push([r, g, b]);
                        }
                    }
                }

                if (pixels.length === 0) {
                    self._closetState.candidates = ['white', 'gray', 'black', 'beige', 'navy'];
                    self.render();
                    return;
                }

                // 간이 클러스터링: 색상 빈도 기반
                var buckets = {};
                pixels.forEach(function (p) {
                    var key = Math.round(p[0] / 32) + ',' + Math.round(p[1] / 32) + ',' + Math.round(p[2] / 32);
                    if (!buckets[key]) buckets[key] = { sum: [0, 0, 0], count: 0 };
                    buckets[key].sum[0] += p[0];
                    buckets[key].sum[1] += p[1];
                    buckets[key].sum[2] += p[2];
                    buckets[key].count++;
                });

                var clusters = Object.values(buckets).sort(function (a, b) { return b.count - a.count; }).slice(0, 5);
                var dominants = clusters.map(function (c) {
                    return [Math.round(c.sum[0] / c.count), Math.round(c.sum[1] / c.count), Math.round(c.sum[2] / c.count)];
                });

                // COLORS_60 매칭
                var matched = [];
                var usedKeys = {};
                dominants.forEach(function (rgb) {
                    var bestKey = '', bestDist = Infinity;
                    Object.entries(COLORS_60).forEach(function (e) {
                        if (usedKeys[e[0]]) return;
                        var hex = e[1].hex;
                        var cr = parseInt(hex.slice(1, 3), 16);
                        var cg = parseInt(hex.slice(3, 5), 16);
                        var cb = parseInt(hex.slice(5, 7), 16);
                        var dist = Math.sqrt(Math.pow(rgb[0] - cr, 2) + Math.pow(rgb[1] - cg, 2) + Math.pow(rgb[2] - cb, 2));
                        if (dist < bestDist) { bestDist = dist; bestKey = e[0]; }
                    });
                    if (bestKey && !usedKeys[bestKey]) {
                        matched.push(bestKey);
                        usedKeys[bestKey] = true;
                    }
                });

                self._closetState.candidates = matched.slice(0, 5);
                if (matched.length > 0) self._closetState.selectedColor = matched[0];
                self.render();
            },
