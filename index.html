        /* ========== IMPROVEMENT CARDS ========== */

            font-weight: 600;

        }
        .improve-card {
            margin-top: 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: var(--transition);
        }

        .improve-card:active {
            transform: scale(0.98);
        }

        .improve-card .ic-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .improve-card .ic-part {
            font-size: 12px;
            font-weight: 600;
        }

        .improve-card .ic-score {

            font-weight: 600;
            color: var(--success);

        }

        .improve-card .ic-badge {

            font-weight: 600;
            color: var(--primary);

            border-radius: 10px;
            margin-left: auto;
        }

        .improve-card-title {
            font-size: 15px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 4px;
        }

        .improve-card .ic-colors {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .improve-card .ic-color-dot {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .improve-card .ic-arrow {
            color: var(--text-muted);
        }

        /* ========== LOADING ========== */
        .loading {
            text-align: center;
            padding: 40px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ========== MISC ========== */
        .hidden {
            display: none !important;
        }

        .mt-12 {
            margin-top: 12px;
        }

        .mb-12 {
            margin-bottom: 12px;
        }

        .text-center {
            text-align: center;
        }

        .text-muted {
            color: var(--text-muted);
        }

        .text-sm {
            font-size: 12px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }

        /* Skip link */

        /* ========== JS-GENERATED CLASSES PATCH ========== */
        /* Feature Card inner elements */

        /* Profile Banner inner elements */
        .profile-banner .pb-emoji {
            font-size: 20px;
            flex-shrink: 0;
        }

        .profile-banner .pb-info {
            flex: 1;
        }

        .profile-banner .pb-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-dark);
        }

        .profile-banner .pb-sub {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 2px;
        }

        .profile-banner .pb-arrow {
            color: var(--primary);
            font-size: 16px;
            flex-shrink: 0;
        }

        /* Diagnosis option selected */
        .diagnosis-option.selected {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        /* Score circle (border-based) */
        .score-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 6px solid var(--bg-alt);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            position: relative;
            box-shadow: 0 4px 20px rgba(28,25,23,0.06);
        }

        .score-circle .score-number {
            font-family: 'Outfit', sans-serif;
            font-size: 38px;
            font-weight: 800;
            line-height: 1;
            color: var(--accent);
        }

        .score-circle .score-label {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 4px;
            font-weight: 500;
        }

        /* Color grid chip with sub-elements */
        .color-grid .color-chip {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: var(--transition);
        }

        .color-grid .color-chip:active {
            transform: scale(0.9);
        }

        .color-grid .color-chip .color-circle {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
        }

        .color-grid .color-chip .color-name {
            position: static;
            transform: none;
            font-size: 10px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            text-align: center;
        }

        /* ─── Layer Selection Grid ─── */
        .layer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .layer-card {
            display: flex;
            align-items: center;
            gap: 4px;
            aspect-ratio: 1;
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 6px 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow);
        }

        .layer-card:active {
            transform: scale(0.97);
        }

        .layer-card:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow-md);
        }

        .layer-card .layer-mannequin {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .layer-card .layer-mannequin svg {
            height: 100%;
            width: auto;
            max-height: 160px;
        }

        .layer-card .layer-parts-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
        }

        .layer-part-row {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .layer-part-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
        }

        .layer-part-name {
            font-size: 11px;
            font-weight: 500;
            color: var(--text);
        }

        /* ─── Garment Type Selection ─── */

        /* ─── Closet ─── */
        .closet-badge {
            display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px;
            border-radius: 10px; font-size: 10px; font-weight: 600;
        }
        .closet-badge.owned { background: #e8f5e9; color: #2e7d32; }
        .closet-badge.need { background: #fff3e0; color: #e65100; }

        /* Add Item */

        .closet-cat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 20px; }
        .closet-cat-btn {
            padding: 14px; background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); text-align: center; cursor: pointer; font-size: 14px;
        }
        .closet-cat-btn:active { border-color: var(--primary); }
        .closet-cat-btn.selected { border-color: var(--primary); background: rgba(194,120,92,0.08); }

        .closet-photo-area {
            width: 100%; aspect-ratio: 1; border-radius: var(--radius); overflow: hidden;
            background: var(--card); border: 2px dashed var(--border); margin-bottom: 16px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            position: relative;
        }
        .closet-photo-area img { width: 100%; height: 100%; object-fit: cover; }
        .closet-photo-placeholder { text-align: center; color: var(--text-sub); }

        .closet-color-candidates {
            display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 16px 0;
        }
        .closet-color-cand {
            width: 56px; height: 56px; border-radius: 14px; cursor: pointer;
            border: 3px solid transparent; display: flex; align-items: center; justify-content: center;
            font-size: 8px; font-weight: 600; transition: all 0.2s;
        }
        .closet-color-cand.selected { border-color: var(--primary); transform: scale(1.1); box-shadow: 0 2px 12px rgba(194,120,92,0.3); }

        /* ─── Weather Guide ─── */
        .weather-hero {
            text-align: center; padding: 24px 16px; margin-bottom: 20px;
            background: linear-gradient(135deg, rgba(194,120,92,0.08), rgba(168,97,63,0.06));
            border-radius: var(--radius);
        }
        .weather-temp { font-size: 56px; font-weight: 900; line-height: 1; }
        .weather-desc { font-size: 14px; color: var(--text-sub); margin-top: 4px; }
        .weather-loc { font-size: 12px; color: var(--text-sub); margin-top: 8px; }
        .weather-detail {
            display: flex; justify-content: center; gap: 20px; margin-top: 12px; font-size: 13px; color: var(--text-sub);
        }
        .weather-layer-card {
            padding: 16px; background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); margin-bottom: 12px;
        }
        .weather-layer-title { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
        .weather-layer-sub { font-size: 12px; color: var(--text-sub); margin-bottom: 12px; }
        .weather-item-row {
            display: flex; align-items: center; gap: 10px; padding: 8px 0;
            border-top: 1px solid var(--border);
        }
        .weather-item-icon { font-size: 20px; width: 32px; text-align: center; flex-shrink: 0; }
        .weather-item-name { font-size: 14px; font-weight: 600; }
        .weather-item-desc { font-size: 11px; color: var(--text-sub); }
        .weather-tip {
            padding: 12px 14px; background: #fff8e1; border-radius: 10px;
            font-size: 13px; color: #795548; margin-bottom: 16px; line-height: 1.5;
        }
        .weather-hourly {
            display: flex; gap: 2px; overflow-x: auto; padding: 8px 0 12px;
            -webkit-overflow-scrolling: touch;
        }
        .weather-hour {
            flex-shrink: 0; width: 52px; text-align: center; padding: 8px 4px;
            border-radius: 10px; font-size: 11px;
        }
        .weather-hour.now { background: rgba(194,120,92,0.1); font-weight: 700; }
        .weather-hour-temp { font-size: 14px; font-weight: 700; margin: 4px 0; }
        .weather-loading { text-align: center; padding: 60px 20px; color: var(--text-sub); }

        /* ─── Style Quiz ─── */
        .quiz-progress { display: flex; gap: 4px; margin-bottom: 20px; }
        .quiz-progress-dot {
            flex: 1; height: 4px; border-radius: 2px; background: var(--border);
        }
        .quiz-progress-dot.done { background: var(--primary); }
        .quiz-progress-dot.current { background: var(--primary); opacity: 0.5; }
        .quiz-q { font-size: 20px; font-weight: 800; line-height: 1.4; margin-bottom: 6px; }
        .quiz-sub { font-size: 13px; color: var(--text-sub); margin-bottom: 20px; }
        .quiz-options { display: flex; flex-direction: column; gap: 10px; }
        .quiz-opt {
            display: flex; align-items: center; gap: 12px;
            padding: 16px; background: var(--card); border: 2px solid var(--border);
            border-radius: var(--radius); cursor: pointer; transition: all 0.2s;
        }
        .quiz-opt:active { transform: scale(0.98); }
        .quiz-opt.selected { border-color: var(--primary); background: rgba(194,120,92,0.06); }
        .quiz-opt-icon { font-size: 24px; flex-shrink: 0; }
        .quiz-opt-text { font-size: 15px; font-weight: 600; }
        .quiz-opt-desc { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
        .quiz-result-card {
            padding: 20px; background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); margin-bottom: 12px; text-align: center;
        }
        .quiz-result-rank { font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
        .quiz-result-bar { height: 6px; border-radius: 3px; background: var(--border); margin-top: 12px; overflow: hidden; }
        .quiz-result-fill { height: 100%; border-radius: 3px; background: var(--primary); }

        /* ─── Saved Outfits ─── */
        .share-btn {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            width: 100%; padding: 14px; border-radius: var(--radius);
            background: var(--card); border: 1px solid var(--border);
            color: var(--text); font-size: 15px; font-weight: 600;
            cursor: pointer; margin-bottom: 8px;
        }
        .share-btn:active { background: var(--border); }
        .save-modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 9999;
            display: flex; align-items: flex-end; justify-content: center;
            opacity: 0; transition: opacity 0.3s;
        }
        .save-modal-overlay.show { opacity: 1; }
        .save-modal {
            width: 100%; max-width: 480px; background: var(--bg);
            border-radius: 20px 20px 0 0; padding: 24px 20px 32px;
            transform: translateY(100%); transition: transform 0.3s;
        }
        .save-modal-overlay.show .save-modal { transform: translateY(0); }
        .save-modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
        .save-modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
        .save-modal-input {
            width: 100%; padding: 12px 14px; border: 1px solid var(--border);
            border-radius: 10px; font-size: 15px; background: var(--card);
            color: var(--text); outline: none; box-sizing: border-box;
        }
        .save-modal-input:focus { border-color: var(--primary); }
        .save-modal-label { font-size: 13px; color: var(--text-sub); margin-bottom: 6px; }
        .save-modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .save-modal-actions button {
            flex: 1; padding: 14px; border-radius: 12px; font-size: 15px;
            font-weight: 600; cursor: pointer; border: none;
        }
        .save-modal-cancel { background: var(--card); color: var(--text); border: 1px solid var(--border) !important; }
        .save-modal-confirm { background: var(--primary); color: #fff; }

        /* ─── Light Diagnosis Step (dark theme) ─── */
        .pcl-step-screen {
            background: #0A0A0F;
            color: #fff;
            padding: 40px 24px;
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .pcl-top-row {
            display: flex;
            align-items: center;
            width: 80%;
            max-width: 300px;
            margin-bottom: 20px;
        }

        .pcl-progress {
            flex: 1;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .pcl-progress-bar {
            height: 100%;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 2px;
            transition: width 0.4s;
        }

        .pcl-phase {
            font-size: 11px;
            letter-spacing: 3px;
            opacity: 0.35;
            margin-bottom: 6px;
            font-weight: 300;
        }

        .pcl-title {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 28px;
            letter-spacing: -1px;
        }

        .pcl-preview {
            display: flex;
            width: 80%;
            max-width: 300px;
            height: 110px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .pcl-prev-half {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pcl-prev-half span {
            font-size: 13px;
            font-weight: 700;
            color: rgba(0, 0, 0, 0.45);
        }

        .pcl-prev-sep {
            width: 24px;
            background: #000;
        }

        .pcl-instruction {
            color: rgba(255, 255, 255, 0.8);
            font-size: 15px;
            line-height: 1.8;
            white-space: pre-line;
            margin-bottom: 10px;
            max-width: 300px;
        }

        .pcl-tip {
            color: rgba(255, 255, 255, 0.45);
            font-size: 12px;
            line-height: 1.7;
            margin-bottom: 10px;
            max-width: 290px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
        }

        .pcl-descs {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
        }

        .pcl-similar-note {
            color: rgba(255, 255, 255, 0.25);
            font-size: 11px;
            margin-bottom: 24px;
        }

        .pcl-btn-start {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.7);
            padding: 14px 28px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        .pcl-btn-start:active {
            background: rgba(255, 255, 255, 0.15);
        }

        .pcl-btn-back {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
            margin-bottom: 12px;
        }

        /* ─── Projection overlay (3-panel) ─── */
        #pc-light-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: none;
            flex-direction: row;
        }

        #pc-light-overlay.active {
            display: flex;
        }

        .pcl-proj-side {
            flex: 1;
            position: relative;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .pcl-proj-side:active {
            filter: brightness(0.9);
        }

        .pcl-proj-mid {
            width: min(40vw, 180px);
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            gap: 16px;
            padding: 16px 8px;
        }

        .pcl-proj-hint {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-align: center;
            line-height: 1.6;
        }

        .pcl-proj-select {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            padding: 14px 24px;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 700;
            white-space: nowrap;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: none;
            cursor: pointer;
            font-family: inherit;
            min-width: 100px;
            min-height: 52px;
        }

        .pcl-proj-select:active {
            background: rgba(0, 0, 0, 0.85);
        }

        .pcl-proj-similar {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.85);
            padding: 16px 14px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            border: none;
            cursor: pointer;
            font-family: inherit;
            min-width: 56px;
            min-height: 56px;
            line-height: 1.3;
        }

        .pcl-proj-similar:active {
            background: rgba(255, 255, 255, 0.25);
        }

        .pcl-proj-back {
            position: absolute;
            top: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
            padding: 10px 16px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: inherit;
            min-width: 48px;
            min-height: 40px;
        }

        .pcl-proj-back:active {
            background: rgba(255, 255, 255, 0.2);
        }

        @media screen and (orientation: portrait) {
            #pc-light-overlay.active {
                flex-direction: column;
            }

            .pcl-proj-side {
                width: 100%;
            }

            .pcl-proj-mid {
                width: 100%;
                height: min(28vw, 120px);
                flex-direction: row;
                padding: 0 20px;
            }

            .pcl-proj-side:first-child .pcl-proj-select {
                bottom: 20px;
            }

            .pcl-proj-side:last-child .pcl-proj-select {
                bottom: auto;
                top: 20px;
            }

            .pcl-proj-back {
                top: auto;
                bottom: auto;
                position: relative;
            }

        /* ─── Fabric Guide ─── */


        .fi-compat.great { background: rgba(52,199,89,0.12); color: #34c759; }
        .fi-compat.ok { background: rgba(255,204,0,0.12); color: #cc9900; }
        .fi-compat.bad { background: rgba(255,59,48,0.12); color: #ff3b30; }

        /* ─── Body Type Guide ─── */

        /* ── 맞춤 적용 토글 ── */
        .fit-toggle-wrap { background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:10px 14px; margin-bottom:14px; }
        .fit-toggle-row { display:flex; align-items:center; justify-content:space-between; }
        .fit-toggle-label { font-size:13px; font-weight:600; }
        .fit-toggle-sub { font-size:11px; color:var(--text-sub); margin-top:2px; }
        .fit-toggle-switch { position:relative; width:44px; height:24px; background:#ccc; border-radius:12px; cursor:pointer; transition:background .2s; flex-shrink:0; }
        .fit-toggle-switch.on { background:var(--primary); }
        .fit-toggle-switch::after { content:''; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; transition:transform .2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
        .fit-toggle-switch.on::after { transform:translateX(20px); }
        .fit-setup-prompt { background:var(--bg); border-radius:10px; padding:12px; margin-top:10px; font-size:13px; }
        .fit-setup-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0; }
        .fit-setup-row .status { font-size:12px; color:var(--text-sub); }
        .fit-setup-row .status.set { color:var(--success); }
        .fit-setup-row a { font-size:12px; color:var(--primary); font-weight:600; text-decoration:none; }

        const SUPABASE_URL = 'https://kwcogjzwpnvqwmifizce.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3Y29nanp3cG52cXdtaWZpemNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzYwODQsImV4cCI6MjA4Nzg1MjA4NH0.9vxFkBSMERxEtQnwEPceEAosLCZjY9NLQO9qfx-MZlw';
        let sb = null;
        try {
            const _supa = window.supabase || window.Supabase;
            if (_supa && _supa.createClient) sb = _supa.createClient(SUPABASE_URL, SUPABASE_KEY);
            else console.warn('Supabase SDK not loaded');
        } catch(e) { console.warn('Supabase init failed:', e); }

        const auth = {
            user: null,
            profile: null,
            async init() {
                if (!sb) return;
                try {
                    const { data } = await sb.auth.getSession();
                    if (data?.session?.user) {
                        this.user = data.session.user;
                        await this.fetchProfile();
                    }
                    sb.auth.onAuthStateChange(async (event, session) => {
                        this.user = session?.user || null;
                        if (this.user) await this.fetchProfile();
                        else this.profile = null;
                        if (app.currentScreen === 'community' || app.currentScreen === 'home') app.render();
                    });
                } catch(e) { console.warn('Auth init error:', e); }
            },
            async fetchProfile() {
                if (!sb || !this.user) return;
                try {
                    const { data } = await sb.from('profiles').select('*').eq('id', this.user.id).single();
                    this.profile = data;
                } catch(e) {}
            },
            async login(email, pw) {
                if (!sb) throw new Error('서버 연결 실패');
                const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
                if (error) throw error;
                this.user = data.user;
                await this.fetchProfile();
                return data;
            },
            async signup(email, pw, nickname) {
                if (!sb) throw new Error('서버 연결 실패');
                const { data, error } = await sb.auth.signUp({ email, password: pw, options: { data: { nickname } } });
                if (error) throw error;
                this.user = data.user;
                await this.fetchProfile();
                return data;
            },
            async logout() {
                if (!sb) return;
                await sb.auth.signOut();
                this.user = null;
                this.profile = null;
            }

        function genOne(style) {

        function generateOutfits(style, count) {

        // EXTRA COLOR PICKER — coherent with existing palette

        function pickExtraColor(existingColors, style) {
            const m = STYLE_MOODS[style];
            const pool = [...new Set([...m.darks, ...m.mids, ...m.lights, ...m.pastels])];
            const existing = new Set(existingColors);

            // Compute existing palette properties

                if (newW >= 2 && newC >= 2) return false;

                // L should provide some contrast with at least one neighbor
                const lc = L(c);
                const hasContrast = existingColors.some(e => Math.abs(L(e) - lc) >= 8);
                if (!hasContrast) return false;

                return true;

            if (cands.length === 0) {

                    const newW = wCount + (t === 'w' ? 1 : 0);
                    const newC = cCount + (t === 'c' ? 1 : 0);
                    return !(newW >= 2 && newC >= 2);

            f5 += m.shoes.includes(o[shoeKey]) ? 5 : (pSet.has(shoeKey) ? 5 : -1);
            f5 = Math.max(0, Math.min(25, f5));
            total += f5;

            // F6: Adjacent contrast (10pt) — check sequential pairs
            let f6 = 10;
            for (let i = 0; i < n - 1; i++) {
                if (cols[i] === cols[i + 1]) f6 -= Math.ceil(8 / n);
                else if (Math.abs(L(cols[i]) - L(cols[i + 1])) < 5) f6 -= Math.ceil(4 / n);
            }
            total += Math.max(0, f6);

            // F7: Diversity (10pt) — scale to part count
            const uniq = new Set(cols).size;
            const maxPt = uniq === n ? 10 : uniq >= n - 1 ? 7 : uniq >= n - 2 ? 4 : 1;
            total += maxPt;

            return { total: Math.min(95, Math.max(0, total)), f1, f2, f4, f5, f6 };
        }

        // ===================================================================
        // GENERIC STYLE FILTER — any part count
        // ===================================================================
        function styleFilterGeneric(style, o, layerType, pinnedKeys) {
            const ld = LAYER_DEFS[layerType];
            const pSet = pinnedKeys ? new Set(Object.keys(pinnedKeys)) : new Set();
            const cols = ld.partKeys.filter(k => !pSet.has(k)).map(k => o[k]).filter(Boolean);
            if (cols.length === 0) return true;
            const n = cols.length;
            const ws = cols.map(temp).filter(t => t === 'w').length;
            const cs = cols.map(temp).filter(t => t === 'c').length;
            const avgL = cols.map(L).reduce((a, b) => a + b) / n;
            const chromatics = cols.filter(c => Cv(c) >= 40);
            const highChrom = cols.filter(c => Cv(c) >= 60);
            const pastels = cols.filter(c => c.startsWith('pastel_'));
            const darks = cols.filter(c => L(c) <= 30);
            const lights = cols.filter(c => L(c) >= 80);
            const purples = cols.filter(c => ['eggplant', 'dark_purple', 'plum', 'mauve', 'purple', 'pastel_lavender', 'pastel_lilac'].includes(c));
            const pinks = cols.filter(c => ['pastel_pink', 'pastel_coral', 'pastel_peach', 'pastel_rose', 'dusty_rose', 'rose', 'salmon'].includes(c));
            const deepBlue = cols.filter(c => ['midnight', 'dark_blue', 'cobalt', 'indigo'].includes(c));
            const earthLight = cols.filter(c => ['cream', 'ivory', 'beige', 'camel', 'tan', 'pastel_peach'].includes(c));
            const heavyGreen = cols.filter(c => ['hunter_green', 'forest', 'dark_green', 'dark_olive'].includes(c));

            // Temperature clash — scaled threshold: W2+C2 for <=5 parts, W3+C3 for 6 parts
            const tempThresh = n <= 5 ? 2 : 3;
            if (ws >= tempThresh && cs >= tempThresh) return false;

            // Adjacent same color (check body parts sequentially)
            const bodyKeys = ld.bodyKeys;
            for (let i = 0; i < bodyKeys.length - 1; i++) {
                if (o[bodyKeys[i]] === o[bodyKeys[i + 1]]) return false;
            }

            // Style-specific rules (same as before but with scaled thresholds)
            switch (style) {
                case 'preppy': case 'ralphlook':
                    if (pastels.length >= Math.ceil(n * 0.6)) return false;
                    if (darks.length >= Math.ceil(n * 0.75) && lights.length === 0) return false;
                    if (purples.length >= 2) return false;
                    if (pinks.length >= 3) return false;
                    break;
                case 'ivy':
                    if (pastels.length >= 2) return false;
                    if (darks.length >= Math.ceil(n * 0.75) && lights.length === 0) return false;
                    if (purples.length >= 2) return false;
                    break;
                case 'dandy':
                    if (pastels.length >= Math.ceil(n * 0.6)) return false;
                    if (highChrom.length >= 2) return false;
                    if (darks.length >= Math.ceil(n * 0.75) && lights.length === 0) return false;
                    break;
                case 'oldmoney':
                    if (pastels.length >= 2) return false;
                    if (chromatics.length >= 3) return false;
                    if (highChrom.length >= 1) return false;
                    var omHues = new Set(cols.filter(c => Cv(c) >= 20).map(c => Math.round(H(c) / 60) % 6));
                    if (omHues.size >= 3) return false;
                    break;
                case 'minimal':
                    if (chromatics.length >= 3) return false;
                    var miniHues = new Set(cols.filter(c => Cv(c) >= 25).map(c => Math.round(H(c) / 60) % 6));
                    if (miniHues.size >= 3) return false;
                    break;
                case 'casual':
                    if (highChrom.length >= 3) return false;
                    if (darks.length >= Math.ceil(n * 0.75) && lights.length === 0 && avgL < 35) return false;
                    break;
                case 'cityboy':
                    if (avgL < 50) return false;
                    if (darks.length >= Math.ceil(n * 0.6)) return false;
                    if (heavyGreen.length >= 2) return false;
                    break;
                case 'normcore':
                    if (pastels.length >= 2) return false;
                    if (chromatics.length >= 2) return false;
                    if (highChrom.length >= 1) return false;
                    break;
                case 'athleisure':
                    if (highChrom.length >= 2) return false;
                    if (ws >= Math.ceil(n * 0.6)) return false;
                    if (lights.length >= Math.ceil(n * 0.6)) return false;
                    if (earthLight.length >= 2) return false;
                    break;
                case 'amekaji': case 'workwear':
                    if (pastels.length >= 1) return false;
                    if (cs >= Math.ceil(n * 0.6)) return false;
                    if (deepBlue.length >= 2) return false;
                    break;
                case 'military':
                    if (pastels.length >= 1) return false;
                    if (cs >= Math.ceil(n * 0.6)) return false;
                    if (purples.length >= 1) return false;
                    if (pinks.length >= 1) return false;
                    break;
                case 'british':
                    if (pastels.length >= 2) return false;
                    if (cs >= Math.ceil(n * 0.6)) return false;
                    if (highChrom.length >= 2) return false;
                    break;
                case 'gorpcore':
                    if (purples.length >= 2) return false;
                    if (pinks.length >= 2) return false;
                    if (cs >= Math.ceil(n * 0.6)) return false;
                    break;
                case 'street':
                    if (pastels.length >= Math.ceil(n * 0.6)) return false;
                    break;
                case 'grunge':
                    if (pastels.length >= 1) return false;
                    if (lights.length >= Math.ceil(n * 0.6)) return false;
                    if (cs >= Math.ceil(n * 0.6)) return false;
                    break;
                case 'contemporary':
                    if (highChrom.length >= 2) return false;
                    var contHues = new Set(cols.filter(c => Cv(c) >= 30).map(c => Math.round(H(c) / 60) % 6));
                    if (contHues.size >= 3) return false;
                    break;
                case 'techwear':
                    if (highChrom.length >= 2) return false;
                    if (chromatics.length >= 3) return false;
                    if (ws >= Math.ceil(n * 0.6)) return false;
                    if (lights.length >= Math.ceil(n * 0.6)) return false;
                    if (earthLight.length >= 2) return false;
                    if (avgL > 60) return false;
                    break;
                case 'genderless':
                    if (highChrom.length >= 2) return false;
                    if (darks.length >= Math.ceil(n * 0.75) && lights.length === 0) return false;
                    break;
            }
            return true;
        }

        // ===================================================================
        // LAYERED genOne — generate outfit for any layer type
        // ===================================================================
        function genOneLayered(style, layerType) {
            layerType = layerType || 'basic';
            for (let a = 0; a < 30; a++) {
                // 1) Generate base 4-part outfit
                const tn = pickTech(style);
                const base = TECHNIQUES[tn].compose(style);
                if (!base || !base.outer || !base.top || !base.bottom || !base.shoes) continue;
                if (!COLORS[base.outer] || !COLORS[base.top] || !COLORS[base.bottom] || !COLORS[base.shoes]) continue;

                // 2) Adapt to target layer
                const adapted = adaptToLayer({ ...base, technique: tn }, layerType, style);

                // 3) Validate all colors exist
                const ld = LAYER_DEFS[layerType];
                const allValid = ld.partKeys.every(k => adapted[k] && COLORS[adapted[k]]);
                if (!allValid) continue;

                // 4) Style filter
                if (!styleFilterGeneric(style, adapted, layerType)) continue;

                // 5) Critic score
                const sc = scoreCriticGeneric(adapted, style, layerType);
                if (sc.total >= 50) return { ...adapted, technique: tn, score: sc };
            }
            return null;
        }

        // ===================================================================
        // LAYERED generateOutfits
        // ===================================================================
        function generateOutfitsLayered(style, count, layerType) {
            layerType = layerType || 'basic';
            const ld = LAYER_DEFS[layerType];
            const outfits = [], seen = new Set(), osCount = {};
            let att = 0; const mx = count * 15;

            while (outfits.length < count && att < mx) {
                att++;
                const o = genOneLayered(style, layerType);
                if (!o) continue;

                // Dedup by full color key
                const key = ld.partKeys.map(k => o[k]).join('/');
                if (seen.has(key)) continue;

                // Cluster limit: outermost+shoes max 4
                const outermost = o[ld.bodyKeys[0]]; // first body part
                const osk = outermost + '_' + o.shoes;
                osCount[osk] = (osCount[osk] || 0) + 1;
                if (osCount[osk] > 4) continue;

                // No 3 identical colors
                const cc = {}; ld.partKeys.forEach(k => { const c = o[k]; cc[c] = (cc[c] || 0) + 1 });
                if (Object.values(cc).some(v => v >= 3)) continue;

                seen.add(key);
                outfits.push(o);
            }
            return outfits.sort((a, b) => b.score.total - a.score.total);
        }

        // Get available colors for a specific part+style
        function getAvailableColors(style, partKey) {
            var sm = STYLE_MOODS[style];
            if (!sm) return [];
            if (partKey === 'shoes') return sm.shoes || [];
            var pool = [].concat(sm.darks, sm.mids, sm.lights, sm.pastels, sm.accents);
            // Remove duplicates
            var seen = {};
            return pool.filter(function (c) { if (seen[c]) return false; seen[c] = true; return true; });
        }

        // Generate one outfit with optional pinned parts
        function genOneLayeredPinned(style, layerType, pinned) {
            layerType = layerType || 'basic';
            pinned = pinned || {};
            var ld = LAYER_DEFS[layerType];
            var pinKeys = Object.keys(pinned);

            for (var a = 0; a < 40; a++) {
                // 1) Generate base 4-part outfit
                var tn = pickTech(style);
                var base = TECHNIQUES[tn].compose(style);
                if (!base || !base.outer || !base.top || !base.bottom || !base.shoes) continue;
                if (!COLORS[base.outer] || !COLORS[base.top] || !COLORS[base.bottom] || !COLORS[base.shoes]) continue;

                // 2) Adapt to target layer
                var adapted = adaptToLayer(Object.assign({}, base, { technique: tn }), layerType, style);

                // 3) Apply pins — overwrite pinned parts
                for (var pk in pinned) {
                    adapted[pk] = pinned[pk];
                }

                // 4) Validate all colors exist
                var allValid = true;
                for (var k = 0; k < ld.partKeys.length; k++) {
                    if (!adapted[ld.partKeys[k]] || !COLORS[adapted[ld.partKeys[k]]]) { allValid = false; break; }
                }
                if (!allValid) continue;

                // 5) Style filter (relaxed if many pins, ignore pinned colors)
                if (pinKeys.length < ld.partKeys.length - 1) {
                    if (!styleFilterGeneric(style, adapted, layerType, pinned)) continue;
                }

                // 6) Critic score
                var sc = scoreCriticGeneric(adapted, style, layerType, pinned);
                if (sc.total >= (pinKeys.length > 0 ? 40 : 50)) {
                    return Object.assign({}, adapted, { technique: tn, score: sc });
                }
            }
            return null;
        }

            layerType = layerType || 'basic';

            var att = 0, mx = count * 20;

            while (outfits.length < count && att < mx) {
                att++;

                if (!o) continue;

                var key = ld.partKeys.map(function (k) { return o[k]; }).join('/');
                if (seen.has(key)) continue;

                // Cluster limit
                var outermost = o[ld.bodyKeys[0]];
                var osk = outermost + '_' + o.shoes;
                osCount[osk] = (osCount[osk] || 0) + 1;
                if (osCount[osk] > 6) continue;

                // No 3 identical
                var cc = {};
                ld.partKeys.forEach(function (k) { var c = o[k]; cc[c] = (cc[c] || 0) + 1; });
                if (Object.values(cc).some(function (v) { return v >= 3; })) continue;

                seen.add(key);
                outfits.push(o);
            }

            // 핀 사용 시 결과 0이면 스타일 필터 완전 해제로 재시도
            if (outfits.length === 0 && pinKeys.length > 0) {
                att = 0; mx = count * 30;
                while (outfits.length < count && att < mx) {
                    att++;
                    var o2 = genOneLayeredPinnedRelaxed(style, layerType, pinned);
                    if (!o2) continue;
                    var key2 = ld.partKeys.map(function (k) { return o2[k]; }).join('/');
                    if (seen.has(key2)) continue;
                    seen.add(key2);
                    outfits.push(o2);
                }
            }

            return outfits.sort(function (a, b) { return b.score.total - a.score.total; });
        }

        // 스타일 필터 완전 해제 버전
        function genOneLayeredPinnedRelaxed(style, layerType, pinned) {
            var ld = LAYER_DEFS[layerType];
            for (var a = 0; a < 60; a++) {
                var tn = pickTech(style);
                var base = TECHNIQUES[tn].compose(style);
                if (!base || !base.outer || !base.top || !base.bottom || !base.shoes) continue;
                if (!COLORS[base.outer] || !COLORS[base.top] || !COLORS[base.bottom] || !COLORS[base.shoes]) continue;
                var adapted = adaptToLayer(Object.assign({}, base, { technique: tn }), layerType, style);
                for (var pk in pinned) { adapted[pk] = pinned[pk]; }
                var allValid = true;
                for (var k = 0; k < ld.partKeys.length; k++) {
                    if (!adapted[ld.partKeys[k]] || !COLORS[adapted[ld.partKeys[k]]]) { allValid = false; break; }
                }
                if (!allValid) continue;
                var sc = scoreCriticGeneric(adapted, style, layerType, pinned);
                if (sc.total >= 20) {
                    return Object.assign({}, adapted, { technique: tn, score: sc });
                }
            }
            return null;
        }

            var names = COMBO_NAMES[style] || COMBO_NAMES.casual;

            return outfits.map(function (o, i) {
                var outfit = {};
                ld.partKeys.forEach(function (k) { outfit[k] = o[k]; });
                // evaluationSystem 점수로 통일 (카드/상세 동일)
                var pc = typeof profile !== 'undefined' ? profile.getPersonalColor() : null;
                var evalResult = (typeof evaluationSystem !== 'undefined') ? evaluationSystem.evaluate(outfit, pc) : null;
                var finalScore = evalResult ? evalResult.total : (o.score ? o.score.total : 0);
                return {
                    id: style + '_' + layerType + '_' + String(i + 1).padStart(2, '0'),
                    name: (names[i % names.length] || ('스타일 ' + (i + 1))) + ' ' + (STYLE_MOODS[style]?.nameKo || style),
                    outfit: outfit,
                    tags: [TECH_TAG_MAP[o.technique] || o.technique],
                    tip: generateTip(o, style, layerType),

                };
            });

        // 헬퍼 함수들
        function getHueDiff(h1, h2) {
            let diff = Math.abs(h1 - h2);
            if (diff > 180) diff = 360 - diff;
            return diff;
        }

        function isNeutralColor(chroma) {
            return chroma <= 12;
        }

        function getToneGroup(h, c, l) {
            if (c <= 12) return 'neutral';
            if (l <= 35) return 'deep';
            if (l >= 75) return 'light';
            if (c >= 60) return 'bright';
            return 'muted';
        }

        function getColorTemperature(h, c, l) {
            if (c <= 12) return { temp: 'neutral', score: 0 };
            let warmScore = 0;
            if ((h >= 0 && h <= 70) || (h >= 320 && h <= 360)) {
                const adjustedH = h >= 320 ? h - 360 : h;
                warmScore = 1.0 - Math.abs(adjustedH - 30) / 70;
            } else if (h >= 200 && h <= 280) {
                warmScore = -1.0 + Math.abs(h - 240) / 80;
            }
            if (c < 30) warmScore *= 0.5;
            let temp;
            if (warmScore > 0.3) temp = 'warm';
            else if (warmScore < -0.3) temp = 'cool';
            else temp = 'neutral';
            return { temp, score: warmScore };
        }

        function calculateHarmonyV6(baseKey, targetKey) {
            const base = COLORS_60[baseKey];
            const target = COLORS_60[targetKey];
            if (!base || !target) return { score: 0, reasons: [], penalties: [] };

            const [h1, c1, l1] = base.hcl;
            const [h2, c2, l2] = target.hcl;

            let score = 0;
            let reasons = [];
            let penalties = [];

            const tone1 = getToneGroup(h1, c1, l1);
            const tone2 = getToneGroup(h2, c2, l2);
            const temp1 = getColorTemperature(h1, c1, l1);
            const temp2 = getColorTemperature(h2, c2, l2);
            const hueDiff = getHueDiff(h1, h2);
            const lDiff = Math.abs(l1 - l2);
            const cDiff = Math.abs(c1 - c2);

            const isBase1Neutral = isNeutralColor(c1);
            const isBase2Neutral = isNeutralColor(c2);
            const isPastel1 = PASTEL_COLORS.includes(baseKey);
            const isPastel2 = PASTEL_COLORS.includes(targetKey);
            const isEarth1 = EARTH_TONE_COLORS.includes(baseKey);
            const isEarth2 = EARTH_TONE_COLORS.includes(targetKey);

            // 톤온톤 감지
            const isToneOnTone = !isBase1Neutral && !isBase2Neutral && hueDiff < 30 && lDiff >= 30;
            if (isToneOnTone) { score += 45; reasons.push('톤온톤'); }

            // 클래식 조합 체크
            const classicPartners1 = CLASSIC_COMBOS[baseKey];
            const classicPartners2 = CLASSIC_COMBOS[targetKey];
            const isClassicCombo = (classicPartners1 && classicPartners1.includes(targetKey)) ||
                (classicPartners2 && classicPartners2.includes(baseKey));
            if (isClassicCombo) { score += 55; reasons.push('클래식'); }

            // 피해야 할 조합 체크
            const avoidPartners1 = AVOID_COMBOS[baseKey];
            const avoidPartners2 = AVOID_COMBOS[targetKey];
            const isAvoidCombo = (avoidPartners1 && avoidPartners1.includes(targetKey)) ||
                (avoidPartners2 && avoidPartners2.includes(baseKey));
            if (isAvoidCombo) { score -= 55; penalties.push('피해야함'); }

            // 파스텔 + 파스텔 조화
            if (isPastel1 && isPastel2) { score += 40; reasons.push('파스텔조화'); }

            // 어스톤 + 어스톤 조화
            if (isEarth1 && isEarth2) { score += 35; reasons.push('어스톤조화'); }

            // 감점 시스템
            const skipPenalty = isClassicCombo || isToneOnTone || (isPastel1 && isPastel2) || (isEarth1 && isEarth2);
            if (!skipPenalty) {
                if (!isBase1Neutral && !isBase2Neutral && hueDiff < 15 && lDiff < 25) {
                    score -= 45; penalties.push('색상중복');
                }
                if (tone1 === 'bright' && tone2 === 'bright' && hueDiff >= 100 && hueDiff <= 140) {
                    score -= 40; penalties.push('보색충돌');
                }
                if (c1 >= 80 && c2 >= 80 && hueDiff > 50 && hueDiff < 100) {
                    score -= 25; penalties.push('채도충돌');
                }
            }

            // 가점 시스템
            if (isBase1Neutral || isBase2Neutral) {
                score += 30; reasons.push('뉴트럴');
                if (isBase1Neutral && !isBase2Neutral) { score += 18; reasons.push('포인트'); }
                if (isBase2Neutral && !isBase1Neutral) { score += 15; reasons.push('안정'); }
            }

            if (lDiff >= 50) { score += 28; reasons.push('강한대비'); }
            else if (lDiff >= 35) { score += 20; reasons.push('명도대비'); }
            else if (lDiff >= 20) { score += 12; reasons.push('소프트대비'); }

            if ((tone1 === 'deep' && l2 >= 60) || (tone2 === 'deep' && l1 >= 60)) {
                score += 22; reasons.push('딥라이트');
            }

            if (temp1.temp === 'neutral' || temp2.temp === 'neutral') { score += 10; }
            else if (temp1.temp === temp2.temp) { score += 15; reasons.push('온도조화'); }

            if (!isBase1Neutral && !isBase2Neutral && hueDiff >= 15 && hueDiff <= 60) {
                score += 18; reasons.push('유사색');
            }

            if (!isBase1Neutral && !isBase2Neutral && cDiff < 30) {
                score += 10; reasons.push('채도조화');
            }

            const commonBonus = COMMON_WARDROBE_COLORS[targetKey] || 0;
            score += commonBonus;
            score = Math.max(0, score);

            return { score: Math.round(score), reasons, penalties, tone1, tone2, isToneOnTone };
        }

        // 색상 추천 계산
        function calculateScarfRecommendations(outerColorKey) {
            const base = COLORS_60[outerColorKey];
            if (!base) return [];

            const recommendations = [];

            Object.entries(COLORS_60).forEach(([targetKey, target]) => {
                if (targetKey === outerColorKey) return;

                const harmony = calculateHarmonyV6(outerColorKey, targetKey);

                if (harmony.score > 0) {
                    let category = 'safe';
                    if (harmony.reasons.includes('톤온톤') || harmony.reasons.includes('유사색')) {
                        category = 'toneontone';
                    } else if (harmony.reasons.includes('포인트') || harmony.reasons.includes('클래식')) {
                        category = 'point';
                    }

                    const mainReason = harmony.reasons[0] || '조화로운 매칭';

                    recommendations.push({
                        colorKey: targetKey,
                        score: harmony.score,
                        reason: mainReason,
                        reasons: harmony.reasons,
                        penalties: harmony.penalties,
                        category: category
                    });
                }
            });

            recommendations.sort((a, b) => b.score - a.score);
            return recommendations.filter(r => r.score >= 75);
        }

        // Backward compatibility wrapper
