workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    
    integrations:
      app_store_connect: Codemagic-Admin
    
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: kr.co.barusa.barupick
      vars:
        BUNDLE_ID: "kr.co.barusa.barupick"
        APP_STORE_CONNECT_ISSUER_ID: "3e10ed98-48a5-408a-b67b-8ee4812f1786"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "N8PL96544Y"
      node: 18
      xcode: latest
      cocoapods: default
    
    scripts:
      - name: Install dependencies
        script: npm install
      
      - name: Build web app
        script: npm run build
      
      - name: Sync Capacitor
        script: npx cap sync ios
      
      - name: Update Bundle ID
        script: |
          cd ios/App
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*;/PRODUCT_BUNDLE_IDENTIFIER = kr.co.barusa.barupick;/" App.xcodeproj/project.pbxproj
      
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      
      - name: Create certificate if needed
        script: |
          app-store-connect list-certificates --type IOS_DISTRIBUTION || \
          app-store-connect create-certificate --type IOS_DISTRIBUTION
      
      - name: Use profiles
        script: xcode-project use-profiles
      
      - name: Build iOS app
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            archive
      
      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --archive-path ios/App/build/App.xcarchive
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true