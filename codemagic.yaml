workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    
    integrations:
      app_store_connect: Codemagic-Admin
    
    environment:
      groups:
        - signing
        - app
      vars:
        BUNDLE_ID: "kr.co.barusa.barupick"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest
      cocoapods: default
    
    scripts:
      - name: Install dependencies
        script: npm install
      
      - name: Build web app
        script: npm run build
      
      - name: Sync Capacitor
        script: npx cap sync ios
      
      - name: Update Bundle ID
        script: |
          cd ios/App
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" App.xcodeproj/project.pbxproj
      
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      
      - name: Initialize keychain
        script: |
          keychain initialize
          keychain add-certificates
      
      - name: Set up profiles
        script: xcode-project use-profiles

      - name: Increment build number
        script: |
          NEW_BUILD=$(date +%s)
          echo "Setting build number to $NEW_BUILD"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $NEW_BUILD" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.1" ios/App/App/Info.plist
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*/CURRENT_PROJECT_VERSION = $NEW_BUILD/g" ios/App/App.xcodeproj/project.pbxproj
          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = 1.0.1/g" ios/App/App.xcodeproj/project.pbxproj
          cat ios/App/App/Info.plist | grep -A1 CFBundleVersion
          grep "CURRENT_PROJECT_VERSION" ios/App/App.xcodeproj/project.pbxproj | head -3

      - name: Build iOS app
        script: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            -allowProvisioningUpdates \
            archive
      
      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true